<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1814;--paper:#211f1b;--card:#272420;
  --ink:#e8e0d4;--muted:#8a8278;--faint:#3e3a34;
  --accent:#c49a6c;--al:#2e2820;
  --today:#e0956a;--has:#b8855a;
  --green:#6a9e7a;--gl:#1e2b22;
  --blue:#6a8fa0;--bl:#1a2630;
  --red:#c0614a;--yellow:#c4aa6c;--yl:#2b2820;
  --shadow:rgba(0,0,0,0.45);
  --sw:260px;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Lora',Georgia,serif;overflow:hidden}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--paper);border-right:1px solid var(--faint);display:flex;flex-direction:column;overflow:hidden;transition:width .26s cubic-bezier(.4,0,.2,1),min-width .26s,opacity .18s,border .26s;flex-shrink:0}
.sidebar.collapsed{width:0;min-width:0;opacity:0;pointer-events:none;border-right-color:transparent}
.sbh{padding:18px 15px 13px;border-bottom:1px solid var(--faint);flex-shrink:0;display:flex;align-items:center;gap:8px}
.sbh h1{font-size:.92rem;font-weight:500;letter-spacing:.04em;white-space:nowrap;flex:1}
.sbh .streak{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--accent);white-space:nowrap}
.vtog{display:flex;margin:9px 9px 0;background:var(--bg);border-radius:6px;padding:2px;gap:2px;flex-shrink:0}
.vb{flex:1;padding:4px 0;border:none;background:transparent;font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted);cursor:pointer;border-radius:4px;transition:all .15s;letter-spacing:.05em;text-transform:uppercase}
.vb.on{background:var(--paper);color:var(--accent);box-shadow:0 1px 3px var(--shadow)}
.cal{flex:1;overflow-y:auto;padding:9px;scrollbar-width:thin;scrollbar-color:var(--faint) transparent}
.mb{margin-bottom:15px}
.ml{font-family:'DM Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px;padding:0 2px}
.wr{display:flex;gap:2px;margin-bottom:3px;align-items:flex-start}
.wl{font-family:'DM Mono',monospace;font-size:.48rem;color:var(--faint);width:20px;padding-top:5px;flex-shrink:0;text-align:right}
.wd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:1}
.dd{aspect-ratio:1;border-radius:50%;border:1.5px solid var(--faint);background:transparent;cursor:pointer;font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .13s;position:relative;flex-shrink:0}
.dd:hover{border-color:var(--accent);color:var(--accent)}
.dd.tod{border-color:var(--today);color:var(--today);font-weight:500}
.dd.sel{background:var(--accent);border-color:var(--accent);color:#1a1814}
.dd.hn{background:var(--al);border-color:var(--has);color:var(--has)}
.dd.hn.sel,.dd.tod.sel{background:var(--accent);border-color:var(--accent);color:#1a1814}
.dd.hn::after{content:'';position:absolute;bottom:1px;right:1px;width:3px;height:3px;border-radius:50%;background:var(--has)}
.dd.hn.sel::after{background:rgba(26,24,20,.5)}
.dd.m1{border-color:#c0614a!important;background:rgba(192,97,74,.14)!important}
.dd.m2{border-color:#c49a6c!important;background:rgba(196,154,108,.12)!important}
.dd.m3{border-color:#c4aa6c!important;background:rgba(196,170,108,.12)!important}
.dd.m4{border-color:#6a9e7a!important;background:rgba(106,158,122,.12)!important}
.dd.m5{border-color:#6a8fa0!important;background:rgba(106,143,160,.12)!important}
.dd.emp{opacity:0;pointer-events:none}
.dd:disabled{opacity:.18;cursor:default;pointer-events:none}
.dh{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;margin-left:22px}
.dhh{font-family:'DM Mono',monospace;font-size:.46rem;text-align:center;color:var(--faint);text-transform:uppercase}
.sbfoot{flex-shrink:0;border-top:1px solid var(--faint)}
.bkbar{padding:6px 9px;display:flex;gap:3px}
.bkbtn{flex:1;padding:5px 0;border:1.5px solid var(--faint);background:transparent;border-radius:5px;font-family:'DM Mono',monospace;font-size:.53rem;color:var(--muted);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap}
.bkbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--al)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
.topbar{display:flex;align-items:center;border-bottom:1px solid var(--faint);background:var(--paper);flex-shrink:0;padding:0 12px;gap:0;height:44px}
.colbtn{width:26px;height:26px;border:1.5px solid var(--faint);background:transparent;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;flex-shrink:0;margin-right:7px}
.colbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--al)}
.tab{padding:0 11px;height:44px;font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);cursor:pointer;border:none;background:transparent;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tbadge{background:var(--red);color:white;border-radius:7px;padding:1px 5px;font-size:.48rem;font-family:'DM Mono',monospace}
.tbright{margin-left:auto;display:flex;align-items:center;gap:5px}
.si{font-family:'DM Mono',monospace;font-size:.53rem;color:var(--faint);letter-spacing:.04em;transition:color .3s}
.si.sv{color:var(--accent)}
.ib{width:26px;height:26px;border:1.5px solid var(--faint);background:transparent;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;flex-shrink:0}
.ib:hover,.ib.on{border-color:var(--accent);color:var(--accent);background:var(--al)}

/* FORMAT BAR */
.fbar{display:flex;align-items:center;gap:1px;padding:4px 16px;border-bottom:1px solid var(--faint);background:var(--bg);flex-wrap:wrap;flex-shrink:0}
.fb{width:25px;height:22px;border:none;background:transparent;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:'DM Mono',monospace;font-size:.6rem;transition:all .12s;flex-shrink:0}
.fb:hover{background:var(--al);color:var(--accent)}
.fx{width:1px;height:11px;background:var(--faint);margin:0 2px;flex-shrink:0}
.fsp{flex:1}
.wc{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--faint);padding:0 4px}
.todbtn{font-family:'DM Mono',monospace;font-size:.53rem;padding:2px 7px;border:1.5px solid var(--today);background:transparent;border-radius:4px;color:var(--today);cursor:pointer;opacity:.8;transition:all .15s}
.todbtn:hover{background:rgba(224,149,106,.12);opacity:1}

/* SEARCH */
.sbar{display:flex;align-items:center;gap:7px;padding:6px 16px;border-bottom:1px solid var(--faint);background:var(--paper);flex-shrink:0}
.sinp{flex:1;background:var(--bg);border:1.5px solid var(--faint);border-radius:5px;padding:5px 10px;font-family:'DM Mono',monospace;font-size:.62rem;color:var(--ink);outline:none;transition:border-color .15s}
.sinp:focus{border-color:var(--accent)}
.sinp::placeholder{color:var(--faint)}
.scls{font-family:'DM Mono',monospace;font-size:.54rem;color:var(--muted);cursor:pointer;padding:3px 7px;border:1.5px solid var(--faint);border-radius:4px;background:transparent;transition:all .15s}
.scls:hover{color:var(--ink)}

/* PANELS */
.panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.panel.hide{display:none}
.sa{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--faint) transparent}

/* ── NOTES: SINGLE DAY ── */
.dv{max-width:660px;margin:0 auto;padding:28px 38px 110px;width:100%}
.dnav{display:flex;align-items:center;gap:8px;margin-bottom:22px}
.backbtn{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted);cursor:pointer;padding:4px 9px;border:1.5px solid var(--faint);border-radius:5px;background:transparent;transition:all .15s;letter-spacing:.04em;text-transform:uppercase}
.backbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--al)}
.arrbtn{width:26px;height:26px;border:1.5px solid var(--faint);background:transparent;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;flex-shrink:0}
.arrbtn:hover{border-color:var(--accent);color:var(--accent)}
.arrbtn:disabled{opacity:.2;pointer-events:none}
.dtitle{font-size:1.3rem;font-weight:500;color:var(--ink);line-height:1.2;margin-bottom:3px}
.dtitle.tod{color:var(--today)}
.dsub{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted)}

/* Verse */
.verse{background:var(--card);border:1px solid var(--faint);border-left:3px solid var(--accent);border-radius:7px;padding:11px 14px;margin-bottom:18px}
.vt{font-style:italic;font-size:.9rem;color:var(--muted);line-height:1.7;margin-bottom:3px}
.vr{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--accent)}

/* Mood */
.moodrow{display:flex;align-items:center;gap:7px;margin-bottom:16px}
.moodlbl{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;flex-shrink:0}
.moodbtn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--faint);background:transparent;cursor:pointer;font-size:.82rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.moodbtn:hover{transform:scale(1.15)}
.moodbtn.sel{border-width:2px;transform:scale(1.12)}
.moodbtn[data-m="1"].sel{border-color:#c0614a;background:rgba(192,97,74,.18)}
.moodbtn[data-m="2"].sel{border-color:#c49a6c;background:rgba(196,154,108,.18)}
.moodbtn[data-m="3"].sel{border-color:#c4aa6c;background:rgba(196,170,108,.18)}
.moodbtn[data-m="4"].sel{border-color:#6a9e7a;background:rgba(106,158,122,.18)}
.moodbtn[data-m="5"].sel{border-color:#6a8fa0;background:rgba(106,143,160,.18)}

/* Photo */
.pzone{margin-bottom:18px}
.pdrop{border:1.5px dashed var(--faint);border-radius:7px;padding:12px;text-align:center;cursor:pointer;transition:all .15s;color:var(--faint);font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.04em}
.pdrop:hover,.pdrop.over{border-color:var(--accent);color:var(--accent);background:var(--al)}
.pprev{position:relative;display:inline-block;max-width:100%}
.pprev img{max-width:100%;max-height:260px;border-radius:7px;display:block;object-fit:cover}
.prm{position:absolute;top:6px;right:6px;width:22px;height:22px;background:rgba(26,24,20,.85);border:1px solid var(--faint);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.prm:hover{background:var(--red);border-color:var(--red);color:white}

/* Note area */
.slbl{font-family:'DM Mono',monospace;font-size:.53rem;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.nta{width:100%;background:transparent;border:none;outline:none;font-family:'Lora',Georgia,serif;font-size:1rem;line-height:1.85;color:var(--ink);resize:none;caret-color:var(--accent);min-height:90px;display:block}
.nta::placeholder{color:var(--faint);font-style:italic}
.ndiv{border:none;border-top:1px solid var(--faint);margin:18px 0}

/* Gratitude */
.grat-inputs{display:flex;flex-direction:column;gap:5px;margin-bottom:4px}
.grow{display:flex;align-items:center;gap:7px}
.gnum{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--faint);width:12px;flex-shrink:0}
.ginp{flex:1;background:transparent;border:none;border-bottom:1px solid var(--faint);outline:none;font-family:'Lora',Georgia,serif;font-size:.9rem;color:var(--ink);padding:3px 2px;caret-color:var(--accent);transition:border-color .15s}
.ginp:focus{border-bottom-color:var(--accent)}
.ginp::placeholder{color:var(--faint);font-style:italic}

/* Preview */
.pvw{font-family:'Lora',Georgia,serif;font-size:1rem;line-height:1.85;color:var(--ink)}
.pvw h1{font-size:1.35rem;font-weight:500;margin:0 0 .5em}
.pvw h2{font-size:1.1rem;font-weight:500;margin:1em 0 .35em}
.pvw h3{font-size:.95rem;font-weight:500;margin:.9em 0 .28em}
.pvw p{margin:0 0 .8em}
.pvw strong{font-weight:600}
.pvw em{font-style:italic;color:var(--muted)}
.pvw ul,.pvw ol{margin:.25em 0 .8em 1.2em}
.pvw li{margin-bottom:.18em}
.pvw blockquote{border-left:3px solid var(--accent);margin:.6em 0;padding:.15em 0 .15em .9em;color:var(--muted);font-style:italic}
.pvw code{font-family:'DM Mono',monospace;font-size:.8em;background:var(--al);padding:.08em .28em;border-radius:3px;color:var(--accent)}
.pvw hr{border:none;border-top:1px solid var(--faint);margin:.9em 0}

/* Search results */
.srw{padding:18px 24px;max-width:660px;margin:0 auto;width:100%}
.sri{padding:11px 13px;border-radius:6px;cursor:pointer;margin-bottom:5px;border:1px solid var(--faint);transition:background .15s}
.sri:hover{background:var(--paper)}
.srd{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--accent);margin-bottom:3px}
.srp{font-size:.84rem;color:var(--muted);line-height:1.5}
.srp mark{background:rgba(196,154,108,.2);color:var(--accent);border-radius:2px;padding:0 2px}

/* ── MASTER TAB ── */
.master-area{max-width:660px;margin:0 auto;padding:28px 38px 110px;width:100%;display:flex;flex-direction:column;height:100%}
.master-ta{flex:1;width:100%;background:transparent;border:none;outline:none;font-family:'Lora',Georgia,serif;font-size:1rem;line-height:1.9;color:var(--ink);resize:none;caret-color:var(--accent);min-height:400px}
.master-ta::placeholder{color:var(--faint);font-style:italic}
.master-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--faint)}
.master-title{font-size:1.1rem;font-weight:500}
.master-wc{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted)}

/* ── PRAYER ── */
.genwrap{max-width:620px;margin:0 auto;padding:26px 34px 100px;width:100%}
.sectitle{font-size:1rem;font-weight:500;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.sectitle-sub{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted);font-weight:400}
.aform{background:var(--card);border:1px solid var(--faint);border-radius:9px;padding:13px;margin-bottom:18px}
.frow{display:flex;gap:6px;margin-bottom:6px}
.fi{flex:1;background:var(--bg);border:1.5px solid var(--faint);border-radius:5px;padding:6px 10px;font-family:'Lora',Georgia,serif;font-size:.86rem;color:var(--ink);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--faint);font-style:italic}
.fta{width:100%;resize:none;min-height:48px;line-height:1.5}
.abtn{padding:6px 16px;background:var(--accent);border:none;border-radius:5px;font-family:'DM Mono',monospace;font-size:.58rem;color:#1a1814;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;white-space:nowrap;align-self:flex-end}
.abtn:hover{background:var(--today)}
.filrow{display:flex;gap:3px;margin-bottom:14px}
.pf{padding:3px 10px;border:1.5px solid var(--faint);background:transparent;border-radius:14px;font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);cursor:pointer;transition:all .15s}
.pf:hover{border-color:var(--accent);color:var(--accent)}
.pf.on{background:var(--accent);border-color:var(--accent);color:#1a1814}
.pitem{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:11px 13px;margin-bottom:6px;display:flex;gap:9px;align-items:flex-start}
.pitem.done{opacity:.5;border-style:dashed}
.pchk{width:17px;height:17px;border:1.5px solid var(--faint);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.pchk:hover{border-color:var(--green)}
.pchk.ok{background:var(--green);border-color:var(--green)}
.pchk.ok::after{content:'✓';font-size:.5rem;color:white;font-family:'DM Mono',monospace}
.pbody{flex:1;min-width:0}
.pname{font-weight:500;font-size:.9rem;margin-bottom:2px}
.pname.done{text-decoration:line-through;color:var(--muted)}
.preq{font-size:.82rem;color:var(--muted);line-height:1.5}
.pmeta{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--faint);margin-top:4px}
.pbadge{font-family:'DM Mono',monospace;font-size:.48rem;color:var(--green);background:var(--gl);padding:2px 5px;border-radius:7px;margin-top:3px;display:inline-block}
.pdel{width:19px;height:19px;border:none;background:transparent;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center;border-radius:3px;transition:all .15s;flex-shrink:0}
.pdel:hover{color:var(--red);background:rgba(192,97,74,.1)}
.lempty{color:var(--faint);font-style:italic;font-size:.86rem;padding:28px 0;text-align:center}

/* ── HABITS ── */
.hcfg{background:var(--card);border:1px solid var(--faint);border-radius:9px;padding:13px;margin-bottom:20px}
.hcfg-t{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px}
.hadd{display:flex;gap:6px}
.hei{width:38px;background:var(--bg);border:1.5px solid var(--faint);border-radius:5px;padding:6px 3px;font-size:.95rem;text-align:center;outline:none;color:var(--ink);transition:border-color .15s}
.hei:focus{border-color:var(--accent)}
.hni{flex:1;background:var(--bg);border:1.5px solid var(--faint);border-radius:5px;padding:6px 10px;font-family:'Lora',Georgia,serif;font-size:.86rem;color:var(--ink);outline:none;transition:border-color .15s}
.hni:focus{border-color:var(--accent)}
.hni::placeholder{color:var(--faint);font-style:italic}
.hwhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hwt{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.hwnav{display:flex;gap:3px}
.hwnb{width:22px;height:22px;border:1.5px solid var(--faint);background:transparent;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.hwnb:hover{border-color:var(--accent);color:var(--accent)}
.hgrid{display:flex;flex-direction:column;gap:7px}
.hrow{display:flex;align-items:center;gap:7px}
.hrlbl{display:flex;align-items:center;gap:5px;width:150px;flex-shrink:0}
.hemoji{font-size:.95rem;width:20px;text-align:center}
.hrname{font-size:.86rem;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.hdelbtn{width:16px;height:16px;border:none;background:transparent;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.hdelbtn:hover{color:var(--red)}
.hdays{display:flex;gap:3px;flex:1}
.hcell{flex:1;aspect-ratio:1;border-radius:4px;border:1.5px solid var(--faint);background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .13s;max-width:34px}
.hcell:hover{border-color:var(--accent)}
.hcell.done{background:var(--al);border-color:var(--has)}
.hcell.done-today{background:var(--al);border-color:var(--accent)}
.hcell .hcd{font-family:'DM Mono',monospace;font-size:.46rem;color:var(--faint)}
.hcell .hck{font-size:.65rem;opacity:0}
.hcell.done .hck,.hcell.done-today .hck{opacity:1}
.hcell.fut{opacity:.2;pointer-events:none}
.hstat{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--accent);margin-left:auto;white-space:nowrap}

/* ── DEADLINES ── */
.dlform{background:var(--card);border:1px solid var(--faint);border-radius:9px;padding:13px;margin-bottom:18px}
.dlgrid{display:grid;grid-template-columns:1fr auto;gap:6px;margin-bottom:6px}
.ddi{background:var(--bg);border:1.5px solid var(--faint);border-radius:5px;padding:6px 10px;font-family:'DM Mono',monospace;font-size:.68rem;color:var(--ink);outline:none;transition:border-color .15s;color-scheme:dark}
.ddi:focus{border-color:var(--accent)}
.dlitem{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:flex-start;gap:9px;transition:all .2s}
.dlitem.ov{border-color:var(--red);background:rgba(192,97,74,.06)}
.dlitem.ds{border-color:var(--yellow);background:rgba(196,170,108,.06)}
.dlitem.dn{opacity:.45;border-style:dashed}
.dlchk{width:17px;height:17px;border:1.5px solid var(--faint);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.dlchk:hover{border-color:var(--green)}
.dlchk.ok{background:var(--green);border-color:var(--green)}
.dlchk.ok::after{content:'✓';font-size:.5rem;color:white;font-family:'DM Mono',monospace}
.dlbody{flex:1;min-width:0}
.dltitle{font-size:.9rem;font-weight:500;margin-bottom:2px}
.dltitle.dn{text-decoration:line-through;color:var(--muted)}
.dlwhen{font-family:'DM Mono',monospace;font-size:.56rem;margin-top:2px}
.dlwhen.ov{color:var(--red)}.dlwhen.ds{color:var(--yellow)}.dlwhen.ok{color:var(--faint)}
.dlbadge{display:inline-block;font-family:'DM Mono',monospace;font-size:.48rem;padding:2px 5px;border-radius:7px;margin-top:2px}
.dlbadge.ov{background:rgba(192,97,74,.18);color:var(--red)}
.dlbadge.ds{background:rgba(196,170,108,.14);color:var(--yellow)}
.dldel{width:18px;height:18px;border:none;background:transparent;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center;border-radius:3px;transition:all .15s;flex-shrink:0}
.dldel:hover{color:var(--red);background:rgba(192,97,74,.1)}

/* ── PEOPLE ── */
.ppl-item{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;transition:border-color .2s}
.ppl-item.ov{border-color:var(--red)!important}
.ppl-item.warn{border-color:var(--yellow)!important}
.ppl-avatar{width:36px;height:36px;border-radius:50%;background:var(--al);border:2px solid var(--faint);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;transition:border-color .2s}
.ppl-item.ov .ppl-avatar{border-color:var(--red)}
.ppl-item.warn .ppl-avatar{border-color:var(--yellow)}
.ppl-body{flex:1;min-width:0}
.ppl-name{font-weight:500;font-size:.92rem;margin-bottom:2px}
.ppl-rel{font-family:'DM Mono',monospace;font-size:.53rem;color:var(--muted);margin-bottom:4px}
.ppl-countdown{font-family:'DM Mono',monospace;font-size:.56rem;margin-bottom:3px}
.ppl-countdown.ok{color:var(--green)}
.ppl-countdown.warn{color:var(--yellow)}
.ppl-countdown.ov{color:var(--red)}
.ppl-last{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--faint)}
.ppl-actions{display:flex;gap:4px;align-items:center;flex-shrink:0}
.ppl-contact-btn{padding:4px 9px;background:var(--accent);border:none;border-radius:5px;font-family:'DM Mono',monospace;font-size:.52rem;color:#1a1814;cursor:pointer;transition:all .15s;white-space:nowrap}
.ppl-contact-btn:hover{background:var(--today)}
.ppl-del{width:18px;height:18px;border:none;background:transparent;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center;border-radius:3px;transition:all .15s}
.ppl-del:hover{color:var(--red);background:rgba(192,97,74,.1)}
.freq-sel{background:var(--bg);border:1.5px solid var(--faint);border-radius:5px;padding:5px 8px;font-family:'DM Mono',monospace;font-size:.62rem;color:var(--ink);outline:none;color-scheme:dark;cursor:pointer}
.freq-sel:focus{border-color:var(--accent)}

/* ── SCRIPTURE ── */
.sc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:4px}
.sc-card{background:var(--card);border:1px solid var(--faint);border-radius:9px;padding:14px;cursor:pointer;transition:all .2s;position:relative;min-height:100px}
.sc-card:hover{border-color:var(--accent)}
.sc-card.memorised{border-color:var(--green);opacity:.65}
.sc-front{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80px;text-align:center}
.sc-ref{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--accent);letter-spacing:.05em;margin-bottom:6px}
.sc-hint{font-size:.75rem;color:var(--faint);font-style:italic}
.sc-back{display:none;font-style:italic;font-size:.88rem;color:var(--ink);line-height:1.7}
.sc-card.flipped .sc-front{display:none}
.sc-card.flipped .sc-back{display:block}
.sc-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--faint)}
.sc-mem-btn{font-family:'DM Mono',monospace;font-size:.5rem;padding:2px 7px;border:1.5px solid var(--faint);background:transparent;border-radius:12px;cursor:pointer;color:var(--muted);transition:all .15s}
.sc-mem-btn:hover{border-color:var(--green);color:var(--green)}
.sc-card.memorised .sc-mem-btn{border-color:var(--green);color:var(--green);background:var(--gl)}
.sc-del{width:16px;height:16px;border:none;background:transparent;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center;border-radius:3px;transition:all .15s}
.sc-del:hover{color:var(--red)}
.sc-add-form{background:var(--card);border:1px solid var(--faint);border-radius:9px;padding:13px;margin-bottom:18px}
.sc-tap-hint{font-family:'DM Mono',monospace;font-size:.54rem;color:var(--faint);margin-bottom:12px;letter-spacing:.04em}

/* QC FAB */
.qcfab{position:fixed;bottom:22px;right:22px;width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.45);transition:all .2s;z-index:50;color:#1a1814}
.qcfab:hover{background:var(--today);transform:scale(1.08)}
.qcmod{position:fixed;bottom:78px;right:22px;width:290px;background:var(--paper);border:1px solid var(--faint);border-radius:11px;padding:13px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:51;display:none}
.qcmod.show{display:block;animation:pu .15s ease}
@keyframes pu{from{opacity:0;transform:translateY(7px) scale(.97)}to{opacity:1;transform:none}}
.qclbl{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.qcta{width:100%;background:var(--bg);border:1.5px solid var(--faint);border-radius:6px;padding:8px 10px;font-family:'Lora',Georgia,serif;font-size:.9rem;color:var(--ink);outline:none;resize:none;min-height:75px;caret-color:var(--accent);line-height:1.65;transition:border-color .15s}
.qcta:focus{border-color:var(--accent)}
.qcta::placeholder{color:var(--faint);font-style:italic}
.qcbtns{display:flex;gap:5px;margin-top:7px;justify-content:flex-end}
.qccnc{font-family:'DM Mono',monospace;font-size:.56rem;padding:4px 9px;border:1.5px solid var(--faint);background:transparent;border-radius:5px;color:var(--muted);cursor:pointer;transition:all .15s}
.qccnc:hover{color:var(--ink)}
.qcsav{font-family:'DM Mono',monospace;font-size:.56rem;padding:4px 11px;border:none;background:var(--accent);border-radius:5px;color:#1a1814;cursor:pointer;transition:all .15s}
.qcsav:hover{background:var(--today)}

/* CONFIRM */
.cnfov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center}
.cnfov.show{display:flex}
.cnfbox{background:var(--paper);border-radius:10px;padding:22px 26px;max-width:280px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);border:1px solid var(--faint)}
.cnfbox p{font-size:.83rem;color:var(--muted);margin-bottom:15px;line-height:1.5}
.cnfbox strong{color:var(--ink)}
.cnfbtns{display:flex;gap:6px;justify-content:center}
.btn{padding:5px 13px;border-radius:5px;border:1.5px solid;font-family:'DM Mono',monospace;font-size:.6rem;cursor:pointer;letter-spacing:.04em;transition:all .15s}
.btnc{border-color:var(--faint);background:transparent;color:var(--muted)}
.btnc:hover{border-color:var(--muted);color:var(--ink)}
.btnd{border-color:var(--red);background:var(--red);color:white}
.btnd:hover{background:#a8503b;border-color:#a8503b}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--bg);font-family:'DM Mono',monospace;font-size:.6rem;padding:7px 15px;border-radius:16px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap;z-index:200;letter-spacing:.03em}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.dv,.pitem,.dlitem,.hrow,.ppl-item,.sc-card{animation:fadeUp .16s ease both}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sbh">
    <h1>Daily Notes</h1>
    <span class="streak" id="streak">0🔥</span>
  </div>
  <div class="vtog">
    <button class="vb on" id="vbW" onclick="setView('w')">Week</button>
    <button class="vb" id="vbM" onclick="setView('m')">Month</button>
  </div>
  <div class="cal" id="cal"></div>
  <div class="sbfoot">
    <div class="bkbar">
      <button class="bkbtn" onclick="exportAll()">
        <svg width="8" height="8" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10v3h10v-3M8 2v7M5 6l3 3 3-3"/></svg>Backup
      </button>
      <button class="bkbtn" onclick="trigImp()">
        <svg width="8" height="8" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6v-3h10v3M8 14V7M5 10l3-3 3 3"/></svg>Restore
      </button>
      <input type="file" id="impFile" accept=".json" style="display:none" onchange="impAll(event)">
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <button class="colbtn" onclick="toggleSB()">
      <svg id="colico" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3H3v10h3M6 3v10M10 5l-3 3 3 3"/></svg>
    </button>
    <button class="tab on"  id="tab-notes"     onclick="goTab('notes')">Notes</button>
    <button class="tab"     id="tab-master"    onclick="goTab('master')">Master</button>
    <button class="tab"     id="tab-prayer"    onclick="goTab('prayer')">Prayer</button>
    <button class="tab"     id="tab-habits"    onclick="goTab('habits')">Habits</button>
    <button class="tab"     id="tab-deadlines" onclick="goTab('deadlines')">
      Deadlines<span class="tbadge" id="dlbadge" style="display:none">!</span>
    </button>
    <button class="tab"     id="tab-people"    onclick="goTab('people')">
      People<span class="tbadge" id="ppbadge" style="display:none">!</span>
    </button>
    <button class="tab"     id="tab-scripture" onclick="goTab('scripture')">Scripture</button>
    <div class="tbright">
      <span class="si" id="si">autosaved</span>
      <button class="ib" id="sBtn" onclick="togSearch()"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4"/><path d="M10 10l3.5 3.5"/></svg></button>
      <button class="ib" id="pvBtn" onclick="togPreview()"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg></button>
    </div>
  </div>

  <!-- FORMAT BAR -->
  <div class="fbar" id="fbar">
    <button class="fb" onclick="fmt('h1')">H1</button>
    <button class="fb" onclick="fmt('h2')">H2</button>
    <button class="fb" onclick="fmt('h3')">H3</button>
    <div class="fx"></div>
    <button class="fb" onclick="fmt('bold')"><svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M3 2h4a2.5 2.5 0 0 1 0 5H3V2zm0 5h4.5a2.5 2.5 0 0 1 0 5H3V7z"/></svg></button>
    <button class="fb" onclick="fmt('italic')"><svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M5 2h5v1.5H8L5.5 8.5H8V10H3V8.5h2L7.5 3.5H5V2z"/></svg></button>
    <div class="fx"></div>
    <button class="fb" onclick="fmt('ul')"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="3" cy="5" r="1.1" fill="currentColor" stroke="none"/><circle cx="3" cy="9" r="1.1" fill="currentColor" stroke="none"/><circle cx="3" cy="13" r="1.1" fill="currentColor" stroke="none"/><path d="M6 5h8M6 9h8M6 13h8"/></svg></button>
    <button class="fb" onclick="fmt('ol')"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 4h2M3 3v3M2 8.5h2l-2 2h2M2 13h2"/><path d="M7 5h7M7 9h7M7 13h7"/></svg></button>
    <button class="fb" onclick="fmt('task')"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="5" height="5" rx="1"/><path d="M9 6.5h5M9 10.5h5"/></svg></button>
    <div class="fx"></div>
    <button class="fb" onclick="fmt('quote')"><svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M3 4h1.5v4H3zm3 0h1.5v4H6zM4 8.5c0 1.5-1 2.5-1 3h1.5c0-.5.5-1.5.5-3H4zm3 0c0 1.5-1 2.5-1 3h1.5c0-.5.5-1.5.5-3H7z"/></svg></button>
    <button class="fb" onclick="fmt('hr')"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 8h12"/></svg></button>
    <div class="fsp"></div>
    <span class="wc" id="wcel">0 words</span>
    <button class="todbtn" onclick="goToday()">Today</button>
  </div>

  <!-- SEARCH BAR -->
  <div class="sbar" id="sbar" style="display:none">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="var(--muted)" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4"/><path d="M10 10l3.5 3.5"/></svg>
    <input class="sinp" id="sinp" placeholder="Search all entries…" oninput="doSearch(this.value)" autocomplete="off">
    <button class="scls" onclick="closeSearch()">Close</button>
  </div>

  <!-- NOTES PANEL -->
  <div class="panel" id="panel-notes">
    <div class="sa" id="noteScroll">
      <div class="dv" id="dv"></div>
      <div id="sres" style="display:none"><div class="srw" id="srw"></div></div>
    </div>
  </div>

  <!-- MASTER PANEL -->
  <div class="panel hide" id="panel-master">
    <div class="sa">
      <div class="master-area">
        <div class="master-header">
          <div class="master-title">Brain Dump</div>
          <span class="master-wc" id="masterwc">0 words</span>
        </div>
        <textarea class="master-ta" id="masterTA" placeholder="Your master note — a place for everything. Plans, thoughts, long-form ideas, anything that doesn't belong to a single day…" spellcheck="true"></textarea>
      </div>
    </div>
  </div>

  <!-- PRAYER PANEL -->
  <div class="panel hide" id="panel-prayer">
    <div class="sa"><div class="genwrap">
      <div class="sectitle">Prayer List <span class="sectitle-sub" id="pstat"></span></div>
      <div class="aform">
        <div class="frow"><input class="fi" id="pname" placeholder="Name…" maxlength="60"><button class="abtn" onclick="addPrayer()">Add</button></div>
        <textarea class="fi fta" id="preq" placeholder="Prayer request…"></textarea>
      </div>
      <div class="filrow">
        <button class="pf on" id="pf-all" onclick="setPF('all')">All</button>
        <button class="pf" id="pf-active" onclick="setPF('active')">Active</button>
        <button class="pf" id="pf-answered" onclick="setPF('answered')">Answered</button>
      </div>
      <div id="plist"></div>
    </div></div>
  </div>

  <!-- HABITS PANEL -->
  <div class="panel hide" id="panel-habits">
    <div class="sa"><div class="genwrap">
      <div class="sectitle">Habit Tracker</div>
      <div class="hcfg">
        <div class="hcfg-t">Add a habit</div>
        <div class="hadd">
          <input class="hei" id="hemo" placeholder="✦" maxlength="2">
          <input class="hni" id="hnam" placeholder="e.g. Morning prayer, Confession, Called a friend…">
          <button class="abtn" onclick="addHabit()">Add</button>
        </div>
      </div>
      <div class="hwhead">
        <span class="hwt" id="hwt"></span>
        <div class="hwnav">
          <button class="hwnb" onclick="shiftHW(-1)"><svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 1L3 5l4 4"/></svg></button>
          <button class="hwnb" onclick="shiftHW(1)" id="hwnext"><svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 1l4 4-4 4"/></svg></button>
        </div>
      </div>
      <div class="hgrid" id="hgrid"></div>
    </div></div>
  </div>

  <!-- DEADLINES PANEL -->
  <div class="panel hide" id="panel-deadlines">
    <div class="sa"><div class="genwrap">
      <div class="sectitle">Deadlines & Reminders <span class="sectitle-sub" id="dlstat"></span></div>
      <div class="dlform">
        <div class="dlgrid">
          <input class="fi" id="dltit" placeholder="What's due…" maxlength="100">
          <input class="ddi fi" id="dldat" type="date">
        </div>
        <textarea class="fi fta" id="dlnot" placeholder="Notes (optional)…" style="min-height:38px"></textarea>
        <div style="display:flex;justify-content:flex-end;margin-top:6px"><button class="abtn" onclick="addDL()">Add deadline</button></div>
      </div>
      <div id="dllist"></div>
    </div></div>
  </div>

  <!-- PEOPLE PANEL -->
  <div class="panel hide" id="panel-people">
    <div class="sa"><div class="genwrap">
      <div class="sectitle">People & Relationships <span class="sectitle-sub" id="ppstat"></span></div>
      <div class="aform">
        <div class="frow">
          <input class="fi" id="ppname" placeholder="Name…" maxlength="60" style="flex:2">
          <input class="fi" id="pprel" placeholder="e.g. Friend, Family…" maxlength="40" style="flex:1.5">
          <select class="freq-sel fi" id="ppfreq">
            <option value="7">Weekly</option>
            <option value="14">Fortnightly</option>
            <option value="30" selected>Monthly</option>
            <option value="90">Quarterly</option>
          </select>
        </div>
        <div class="frow" style="margin-bottom:0">
          <input class="fi" id="ppemoji" placeholder="Emoji (optional)" maxlength="2" style="width:60px;flex:none">
          <textarea class="fi fta" id="ppnote" placeholder="Notes about them…" style="min-height:38px"></textarea>
          <button class="abtn" onclick="addPerson()">Add</button>
        </div>
      </div>
      <div id="pplist"></div>
    </div></div>
  </div>

  <!-- SCRIPTURE PANEL -->
  <div class="panel hide" id="panel-scripture">
    <div class="sa"><div class="genwrap">
      <div class="sectitle">Scripture Memory <span class="sectitle-sub" id="scstat"></span></div>
      <div class="sc-add-form">
        <div class="frow">
          <input class="fi" id="scref" placeholder="Reference — e.g. John 3:16" maxlength="60" style="flex:1">
          <button class="abtn" onclick="addScripture()">Add</button>
        </div>
        <textarea class="fi fta" id="sctext" placeholder="Verse text…" style="min-height:52px"></textarea>
      </div>
      <div class="sc-tap-hint">Tap a card to reveal the verse · tap again to hide</div>
      <div class="sc-grid" id="scgrid"></div>
    </div></div>
  </div>
</main>
</div>

<!-- QC FAB -->
<button class="qcfab" id="qcfab" onclick="togQC()">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
</button>
<div class="qcmod" id="qcmod">
  <div class="qclbl">Quick capture → today</div>
  <textarea class="qcta" id="qcta" placeholder="Capture a thought…"></textarea>
  <div class="qcbtns">
    <button class="qccnc" onclick="closeQC()">Cancel</button>
    <button class="qcsav" onclick="saveQC()">Save to today</button>
  </div>
</div>

<!-- CONFIRM -->
<div class="cnfov" id="cnfov">
  <div class="cnfbox">
    <p>Delete <strong id="cnflbl"></strong>?<br><span style="font-size:.76rem">This can't be undone.</span></p>
    <div class="cnfbtns">
      <button class="btn btnc" onclick="closeCnf()">Cancel</button>
      <button class="btn btnd" onclick="doDel()">Delete</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════

}

// DATE UTILS
// ══════════════════════════════════════════════
function fd(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function dl(s){return pd(s).toLocaleDateString('en-AU',{weekday:'long'});}
function fl(s){return pd(s).toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});}
function sl(s){return pd(s).toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sow(d){const dn=d.getDay(),diff=dn===0?-6:1-dn,m=new Date(d);m.setDate(d.getDate()+diff);return m;}
function wn(d){const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-dn);const y=new Date(Date.UTC(u.getUTCFullYear(),0,1));return Math.ceil((((u-y)/86400000)+1)/7);}
function nDates(){return Object.keys(notes).filter(k=>notes[k]&&notes[k].trim());}
function streak(){let s=0,d=new Date();if(!notes[fd(d)])d=addD(d,-1);while(notes[fd(d)]){s++;d=addD(d,-1);}return s;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function wc(s){return s&&s.trim()?s.trim().split(/\s+/).length:0;}

function setView(v){calV=v;document.getElementById('vbW').classList.toggle('on',v==='w');document.getElementById('vbM').classList.toggle('on',v==='m');renderCal();}
function renderCal(){
  calV==='w'?renderWeekly():renderMonthly();
  document.getElementById('streak').textContent=streak()+'🔥';
}
function dcls(ds){
  const m=mood[ds]?`m${mood[ds]}`:'';
  return['dd',ds===TODAY?'tod':'',ds===selCal?'sel':'',notes[ds]&&notes[ds].trim()?'hn':'',m].filter(Boolean).join(' ');
}
function renderWeekly(){
  const area=document.getElementById('cal'),today=new Date(),m0=sow(today);
  const weeks=Array.from({length:10},(_,i)=>addD(m0,-(9-i)*7));
  const DN=['M','T','W','T','F','S','S'];
  let html='',lm=null;
  for(const mon of weeks){
    const mk=`${mon.getFullYear()}-${mon.getMonth()}`;
    if(mk!==lm){if(lm!==null)html+='</div>';html+=`<div class="mb"><div class="ml">${mon.toLocaleDateString('en-AU',{month:'long',year:'numeric'})}</div><div class="dh">${DN.map(d=>`<div class="dhh">${d}</div>`).join('')}</div>`;lm=mk;}
    html+=`<div class="wr"><div class="wl">W${wn(mon)}</div><div class="wd">`;
    for(let j=0;j<7;j++){const day=addD(mon,j),ds=fd(day),fut=day>today&&ds!==TODAY;html+=`<button class="${dcls(ds)}" onclick="openDay('${ds}')" title="${ds}" ${fut?'disabled':''}>${day.getDate()}</button>`;}
    html+=`</div></div>`;
  }
  if(lm)html+='</div>';area.innerHTML=html;
  setTimeout(()=>{area.scrollTop=area.scrollHeight;},10);
}
function renderMonthly(){
  const area=document.getElementById('cal'),today=new Date();
  const months=Array.from({length:5},(_,i)=>new Date(today.getFullYear(),today.getMonth()-4+i,1));
  const DN=['M','T','W','T','F','S','S'];
  let html='';
  for(const fd0 of months){
    const y=fd0.getFullYear(),m=fd0.getMonth(),dim=new Date(y,m+1,0).getDate(),off=(fd0.getDay()||7)-1;
    html+=`<div class="mb"><div class="ml">${fd0.toLocaleDateString('en-AU',{month:'long',year:'numeric'})}</div><div class="dh">${DN.map(d=>`<div class="dhh">${d}</div>`).join('')}</div>`;
    const cells=[...Array(off).fill(null),...Array.from({length:dim},(_,i)=>new Date(y,m,i+1))];
    for(let row=0;row<Math.ceil(cells.length/7);row++){
      html+=`<div class="wr"><div class="wl"></div><div class="wd">`;
      for(let col=0;col<7;col++){const day=cells[row*7+col];if(!day){html+=`<button class="dd emp"></button>`;continue;}const ds=fd(day),fut=day>today&&ds!==TODAY;html+=`<button class="${dcls(ds)}" onclick="openDay('${ds}')" title="${ds}" ${fut?'disabled':''}>${day.getDate()}</button>`;}
      html+=`</div></div>`;
    }
    html+='</div>';
  }
  area.innerHTML=html;
  setTimeout(()=>{area.scrollTop=area.scrollHeight;},10);
}

function getVerse(ds){const d=pd(ds),doy=Math.floor((d-new Date(d.getFullYear(),0,0))/(864e5));return VERSES[doy%VERSES.length];}

  const v=getVerse(ds);

  let photoHTML='';

    photoHTML=photo
      ?`<div class="pzone"><div class="pprev"><img src="${photo}" alt=""><button class="prm" onclick="rmPhoto()"><svg width="7" height="7" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l8 8M9 1l-8 8"/></svg></button></div></div>`
      :`<div class="pzone"><div class="pdrop" id="pdrop" onclick="trigPhoto()" ondragover="pdov(event)" ondragleave="pdlv()" ondrop="pdrp(event)"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:3px"><rect x="1" y="3" width="14" height="10" rx="2"/><circle cx="5.5" cy="7" r="1.5"/><path d="M1 11l4-4 3 3 2-2 5 5"/></svg><br>Add photo</div><input type="file" id="phoinp" accept="image/*" style="display:none" onchange="phoSel(event)"></div>`;

// FORMAT
// ══════════════════════════════════════════════
function fmt(type){
  if(isPrev)return;const ta=document.getElementById('mta');if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.substring(s,e),bef=ta.value.substring(0,s),aft=ta.value.substring(e);
  switch(type){
    case 'bold':ta.value=bef+`**${sel||'bold text'}**`+aft;ta.selectionStart=s+(sel?0:2);ta.selectionEnd=s+(sel?sel.length+4:11);break;
    case 'italic':ta.value=bef+`*${sel||'italic text'}*`+aft;ta.selectionStart=s+(sel?0:1);ta.selectionEnd=s+(sel?sel.length+2:12);break;
    case 'h1':ipfx(ta,'# ');break;case 'h2':ipfx(ta,'## ');break;case 'h3':ipfx(ta,'### ');break;
    case 'ul':ipfx(ta,'- ');break;case 'ol':ipfx(ta,'1. ');break;case 'task':ipfx(ta,'- [ ] ');break;
    case 'quote':ipfx(ta,'> ');break;
    case 'hr':{const nl=bef.endsWith('\n')||bef===''?'':'\n';ta.value=bef+nl+'\n---\n\n'+aft;ta.selectionStart=ta.selectionEnd=s+nl.length+6;break;}
  }
  ta.dispatchEvent(new Event('input'));ta.focus();autoR(ta);
}
function ipfx(ta,pfx){const s=ta.selectionStart,bef=ta.value.substring(0,s),aft=ta.value.substring(s),ls=bef.lastIndexOf('\n')+1,lc=bef.substring(ls);if(lc.startsWith(pfx)){ta.value=bef.substring(0,ls)+lc.substring(pfx.length)+aft;ta.selectionStart=ta.selectionEnd=s-pfx.length;}else{ta.value=bef.substring(0,ls)+pfx+lc+aft;ta.selectionStart=ta.selectionEnd=s+pfx.length;}}
function onKD(e){
  const ta=e.target;
  if(e.key==='Tab'){e.preventDefault();const s=ta.selectionStart;ta.value=ta.value.substring(0,s)+'  '+ta.value.substring(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+2;ta.dispatchEvent(new Event('input'));return;}
  if(e.key==='Enter'){const s=ta.selectionStart,bef=ta.value.substring(0,s),ls=bef.lastIndexOf('\n')+1,line=bef.substring(ls);
    const ul=line.match(/^(\s*)(- \[[ x]\] |- )/),ol=line.match(/^(\s*)(\d+)\. /);
    if(ul){e.preventDefault();if(line===ul[0]){ta.value=ta.value.substring(0,ls)+'\n'+ta.value.substring(s);ta.selectionStart=ta.selectionEnd=ls+1;}else{const ins='\n'+ul[1]+(ul[2].includes('[ ]')||ul[2].includes('[x]')?'- [ ] ':'- ');ta.value=bef+ins+ta.value.substring(s);ta.selectionStart=ta.selectionEnd=s+ins.length;}ta.dispatchEvent(new Event('input'));autoR(ta);}
    else if(ol){e.preventDefault();const ins='\n'+ol[1]+(parseInt(ol[2])+1)+'. ';ta.value=bef+ins+ta.value.substring(s);ta.selectionStart=ta.selectionEnd=s+ins.length;ta.dispatchEvent(new Event('input'));autoR(ta);}
  }
}

// ══════════════════════════════════════════════
// MARKDOWN
// ══════════════════════════════════════════════
function renderMD(md){
  if(!md||!md.trim())return'';
  let h=esc(md);
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/^---$/gm,'<hr>');h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/^- \[x\] (.+)$/gm,'<li style="list-style:none"><input type="checkbox" checked disabled style="margin-right:5px;accent-color:var(--accent)"> <s style="opacity:.5">$1</s></li>');
  h=h.replace(/^- \[ \] (.+)$/gm,'<li style="list-style:none"><input type="checkbox" disabled style="margin-right:5px;accent-color:var(--accent)"> $1</li>');
  h=h.replace(/^- (.+)$/gm,'<li>$1</li>');h=h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  h=h.replace(/(<li[\s\S]*?<\/li>)(\n<li[\s\S]*?<\/li>)*/g,m=>`<ul>${m}</ul>`);
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/`(.+?)`/g,'<code>$1</code>');
  const lines=h.split('\n'),bt=['<h1','<h2','<h3','<hr','<ul','</ul','<bl','<li'];
  let res=[],para=[];
  for(const line of lines){const iB=bt.some(t=>line.startsWith(t))||line==='';if(iB){if(para.length){res.push('<p>'+para.join(' ')+'</p>');para=[];}if(line)res.push(line);}else para.push(line);}
  if(para.length)res.push('<p>'+para.join(' ')+'</p>');
  return res.join('\n');
}

function doSearch(q){
  const res=document.getElementById('sres'),dv=document.getElementById('dv');
  if(!q.trim()){res.style.display='none';dv.style.display='';return;}
  res.style.display='';dv.style.display='none';

  document.getElementById('srw').innerHTML=matches.map(([date,text])=>{
    const label=pd(date).toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const idx=text.toLowerCase().indexOf(term),st=Math.max(0,idx-50),en=Math.min(text.length,idx+85);

function togHabit(hid,ds){if(!hlog[ds])hlog[ds]={};hlog[ds][hid]=!hlog[ds][hid];if(!hlog[ds][hid])delete hlog[ds][hid];if(!Object.keys(hlog[ds]).length)delete hlog[ds];P(K.hlog,hlog);renderHabits();}
function shiftHW(d){hwOff+=d;if(hwOff>0)hwOff=0;renderHabits();}

function addDL(){const t=document.getElementById('dltit').value.trim(),d=document.getElementById('dldat').value,n=document.getElementById('dlnot').value.trim();if(!t||!d)return;deadlines.push({id:Date.now().toString(),title:t,date:d,note:n,done:false});deadlines.sort((a,b)=>a.date.localeCompare(b.date));P(K.deadlines,deadlines);document.getElementById('dltit').value='';document.getElementById('dlnot').value='';renderDL();updateDLBadge();}
function togDL(id){const d=deadlines.find(x=>x.id===id);if(d)d.done=!d.done;P(K.deadlines,deadlines);renderDL();updateDLBadge();}
function dlUrg(dateStr,done){
  if(done)return{cls:'dn',label:'',when:'Completed'};
  const today=new Date();today.setHours(0,0,0,0);
  const due=pd(dateStr),diff=Math.round((due-today)/(864e5));
  if(diff<0)return{cls:'ov',label:'Overdue',when:`${Math.abs(diff)}d overdue`};
  if(diff===0)return{cls:'ds',label:'Due today',when:'Due today'};
  if(diff<=3)return{cls:'ds',label:`${diff}d left`,when:`Due in ${diff} day${diff===1?'':'s'}`};
  return{cls:'ok',label:'',when:`Due ${pd(dateStr).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}`};
}
function renderDL(){
  const act=deadlines.filter(d=>!d.done),dn=deadlines.filter(d=>d.done);
  document.getElementById('dlstat').textContent=`${act.length} active · ${dn.length} done`;
  const el=document.getElementById('dllist');
  if(!deadlines.length){el.innerHTML='<div class="lempty">No deadlines yet.</div>';return;}
  el.innerHTML=[...act,...dn].map(d=>{const u=dlUrg(d.date,d.done);return`<div class="dlitem ${d.done?'dn':u.cls}"><div class="dlchk ${d.done?'ok':''}" onclick="togDL('${d.id}')"></div><div class="dlbody"><div class="dltitle ${d.done?'dn':''}">${esc(d.title)}</div>${d.note?`<div style="font-size:.8rem;color:var(--muted);margin-top:2px">${esc(d.note)}</div>`:''}<div class="dlwhen ${d.done?'ok':u.cls}">${u.when}</div>${u.label&&!d.done?`<span class="dlbadge ${u.cls}">${u.label}</span>`:''}</div><button class="dldel" onclick="askDel('dl','${d.id}','${esc(d.title)}')"><svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5l.5-9"/></svg></button></div>`;}).join('');
  updateDLBadge();
}
function updateDLBadge(){const n=deadlines.filter(d=>{if(d.done)return false;const u=dlUrg(d.date,false);return u.cls==='ov'||u.cls==='ds';}).length;const b=document.getElementById('dlbadge');if(b){b.style.display=n?'':'none';b.textContent=n>9?'9+':n;}}

function logContact(id){const p=people.find(x=>x.id===id);if(p){p.lastContact=TODAY;}P(K.people,people);renderPeople();updatePPBadge();showToast('Contact logged ✓');}
function ppUrgency(p){
  const today=new Date();today.setHours(0,0,0,0);
  const last=pd(p.lastContact);
  const daysSince=Math.round((today-last)/(864e5));
  const daysLeft=p.freq-daysSince;
  if(daysLeft<0)return{cls:'ov',txt:`${Math.abs(daysLeft)}d overdue — reach out!`};
  if(daysLeft<=Math.floor(p.freq*0.2))return{cls:'warn',txt:`${daysLeft}d until check-in`};
  return{cls:'ok',txt:`${daysLeft}d until check-in`};
}
function renderPeople(){
  const el=document.getElementById('pplist');
  if(!people.length){el.innerHTML='<div class="lempty">No one added yet. Add someone above.</div>';return;}
  // Sort: most overdue first
  const sorted=[...people].sort((a,b)=>{const ua=ppUrgency(a),ub=ppUrgency(b);const o={ov:0,warn:1,ok:2};return o[ua.cls]-o[ub.cls];});
  const ov=people.filter(p=>ppUrgency(p).cls==='ov').length;
  document.getElementById('ppstat').textContent=`${people.length} people · ${ov} overdue`;
  el.innerHTML=sorted.map(p=>{
    const u=ppUrgency(p);
    const last=pd(p.lastContact).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
    const freqLabel={7:'Weekly',14:'Fortnightly',30:'Monthly',90:'Quarterly'}[p.freq]||`Every ${p.freq}d`;
    return`<div class="ppl-item ${u.cls==='ov'?'ov':u.cls==='warn'?'warn':''}">
      <div class="ppl-avatar">${p.emoji||'👤'}</div>
      <div class="ppl-body">
        <div class="ppl-name">${esc(p.name)}</div>
        ${p.rel?`<div class="ppl-rel">${esc(p.rel)} · ${freqLabel}</div>`:`<div class="ppl-rel">${freqLabel}</div>`}
        <div class="ppl-countdown ${u.cls}">${u.txt}</div>
        <div class="ppl-last">Last contact: ${last}</div>
        ${p.note?`<div style="font-size:.78rem;color:var(--muted);margin-top:3px">${esc(p.note)}</div>`:''}
      </div>
      <div class="ppl-actions">
        <button class="ppl-contact-btn" onclick="logContact('${p.id}')">✓ Spoke</button>
        <button class="ppl-del" onclick="askDel('person','${p.id}','${esc(p.name)}')"><svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5l.5-9"/></svg></button>
      </div>
    </div>`;
  }).join('');
  updatePPBadge();
}
function updatePPBadge(){const n=people.filter(p=>ppUrgency(p).cls==='ov').length;const b=document.getElementById('ppbadge');if(b){b.style.display=n?'':'none';b.textContent=n>9?'9+':n;}}

function askDel(type,id,label){pendDel={type,id};document.getElementById('cnflbl').textContent=label;document.getElementById('cnfov').classList.add('show');}

// BACKUP
// ══════════════════════════════════════════════
function exportAll(){
  const payload={notes,grat,mood,master:masterText,prayers,habits,hlog,deadlines,people,scripture};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`daily-notes-backup-${TODAY}.json`;a.click();
  showToast('Everything backed up ✓');
}
function trigImp(){document.getElementById('impFile').value='';document.getElementById('impFile').click();}
function impAll(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imp=JSON.parse(ev.target.result);
      if(imp.notes&&typeof imp.notes==='object'){
        notes={...notes,...imp.notes};
        if(imp.grat)Object.assign(grat,imp.grat);
        if(imp.mood)Object.assign(mood,imp.mood);
        if(imp.master)masterText=imp.master;
        if(Array.isArray(imp.prayers)){const ids=new Set(prayers.map(p=>p.id));imp.prayers.forEach(p=>{if(!ids.has(p.id))prayers.push(p);});}
        if(Array.isArray(imp.habits))imp.habits.forEach(h=>{if(!habits.find(x=>x.id===h.id))habits.push(h);});
        if(imp.hlog)Object.assign(hlog,imp.hlog);
        if(Array.isArray(imp.deadlines))imp.deadlines.forEach(d=>{if(!deadlines.find(x=>x.id===d.id))deadlines.push(d);});
        if(Array.isArray(imp.people))imp.people.forEach(p=>{if(!people.find(x=>x.id===p.id))people.push(p);});
        if(Array.isArray(imp.scripture))imp.scripture.forEach(s=>{if(!scripture.find(x=>x.id===s.id))scripture.push(s);});
      } else {const keys=Object.keys(imp);if(keys.every(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)))notes={...notes,...imp};else throw 0;}
      saveAll();renderCal();if(curDate)renderDay();showToast('Restored ✓');
    }catch{showToast('Could not read that file');}
  };
  reader.readAsText(file);
}
