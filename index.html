<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Notes">
<title>Daily Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1a1814;--paper:#211f1b;--card:#272420;
  --ink:#e8e0d4;--muted:#8a8278;--faint:#3e3a34;
  --accent:#c49a6c;--al:#2e2820;
  --today:#e0956a;--has:#b8855a;
  --green:#6a9e7a;--gl:#1e2b22;
  --red:#c0614a;--yellow:#c4aa6c;
  --special:#f0c060;--blue:#6a8fa0;
  --shadow:rgba(0,0,0,0.45);
  --sw:268px;--fs:1rem;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
  --nav-h:58px;
}
:root.light{
  --bg:#f5f0e8;--paper:#faf7f2;--card:#f0ebe0;
  --ink:#2c2416;--muted:#7a6e5f;--faint:#c5bfb4;
  --accent:#8b6f47;--al:#e8ddd0;
  --today:#c4714a;--has:#a0845c;
  --green:#4a7e5a;--gl:#d8ede0;
  --red:#a8503b;--yellow:#a08040;
  --shadow:rgba(44,36,22,0.12);
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Lora',Georgia,serif;overflow:hidden;font-size:var(--fs);-webkit-text-size-adjust:100%}

/* ── ROOT LAYOUT ── */
.app{
  display:flex;flex-direction:column;
  height:100dvh;overflow:hidden;
  padding-top:var(--safe-t);
}

/* ── TOP BAR (calendar + settings) ── */
.topbar{
  display:flex;align-items:center;
  background:var(--paper);border-bottom:1px solid var(--faint);
  flex-shrink:0;height:46px;
  padding:0 calc(10px + var(--safe-l)) 0 calc(10px + var(--safe-r));
  gap:8px;
}
.tb-title{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;flex:1;text-align:center}
.ib{width:32px;height:32px;border:1.5px solid var(--faint);background:transparent;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;flex-shrink:0;-webkit-appearance:none}
.ib:active,.ib.on{border-color:var(--accent);color:var(--accent);background:var(--al)}

/* ── BODY AREA (sidebar + pages) ── */
.body-area{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── SANCTUARY PANEL (swipe-right) ── */
.sanctuary{
  width:100%;flex-shrink:0;
  background:var(--bg);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  transform:translateX(-100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  position:absolute;top:0;left:0;bottom:0;z-index:10;
  padding:24px calc(22px + var(--safe-l)) 120px;
}
.sanctuary::-webkit-scrollbar{display:none}
.sanctuary.open{transform:translateX(0)}
.sanct-close{position:sticky;top:0;display:flex;justify-content:flex-end;margin-bottom:16px;z-index:2}
.sanct-close-btn{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);padding:5px 10px;border:1.5px solid var(--faint);border-radius:5px;background:var(--bg);cursor:pointer;-webkit-appearance:none}
.sanct-close-btn:active{color:var(--accent);border-color:var(--accent)}

/* Coptic calendar block */
.coptic-block{background:var(--card);border:1px solid var(--faint);border-left:3px solid var(--accent);border-radius:10px;padding:16px 18px;margin-bottom:24px}
.coptic-date-label{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.coptic-date{font-size:calc(var(--fs)*1.15);font-weight:500;color:var(--ink);margin-bottom:4px}
.coptic-season{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);margin-bottom:10px}
.coptic-saint-label{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.coptic-saint{font-size:calc(var(--fs)*.9);color:var(--ink-muted);font-style:italic;line-height:1.5}

/* Psalm block */
.psalm-block{margin-bottom:24px}
.psalm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.psalm-title{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase}
.psalm-edit-btn{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);padding:4px 9px;border:1.5px solid var(--faint);border-radius:5px;background:transparent;cursor:pointer;-webkit-appearance:none}
.psalm-edit-btn:active{color:var(--accent);border-color:var(--accent)}
.psalm-text{font-size:calc(var(--fs)*1.02);line-height:2;color:var(--ink);font-style:italic;white-space:pre-wrap}
.psalm-ref{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--accent);margin-top:12px}
.psalm-editor{display:none;flex-direction:column;gap:8px}
.psalm-editor.show{display:flex}
.psalm-ta{width:100%;background:var(--card);border:1.5px solid var(--faint);border-radius:8px;padding:12px;font-family:'Lora',Georgia,serif;font-size:.92rem;color:var(--ink);outline:none;resize:none;min-height:120px;caret-color:var(--accent);line-height:1.8;-webkit-appearance:none}
.psalm-ta:focus{border-color:var(--accent)}
.psalm-ref-inp{width:100%;background:var(--card);border:1.5px solid var(--faint);border-radius:7px;padding:9px 12px;font-family:'DM Mono',monospace;font-size:.68rem;color:var(--ink);outline:none;-webkit-appearance:none}
.psalm-ref-inp:focus{border-color:var(--accent)}
.psalm-ref-inp::placeholder{color:var(--faint)}
.psalm-save-btn{padding:8px 18px;background:var(--accent);border:none;border-radius:6px;font-family:'DM Mono',monospace;font-size:.6rem;color:#1a1814;cursor:pointer;align-self:flex-end;-webkit-appearance:none}
.psalm-save-btn:active{background:var(--today)}
.psalm-empty{color:var(--faint);font-style:italic;font-size:.9rem;text-align:center;padding:32px 0}

/* ── MAIN PAGES (swipeable) ── */
.pages{flex:1;display:flex;overflow:hidden;min-height:0;position:relative}
.page{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;min-width:0}
.page.hide{display:none}
.sa{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--faint) transparent}

/* ── FORMAT BAR (notes only, sticks above keyboard) ── */
.fbar-wrap{flex-shrink:0;background:var(--bg);border-top:1px solid var(--faint)}
.fbar{display:flex;align-items:center;gap:1px;padding:4px calc(12px + var(--safe-l)) 4px calc(12px + var(--safe-r));overflow-x:auto;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.fb{min-width:30px;height:28px;border:none;background:transparent;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:'DM Mono',monospace;font-size:.64rem;transition:all .12s;flex-shrink:0;-webkit-appearance:none;padding:0 4px;touch-action:manipulation}
.fb:active{background:var(--al);color:var(--accent)}
.fx{width:1px;height:12px;background:var(--faint);margin:0 2px;flex-shrink:0}
.fsp{flex:1;min-width:6px}
.wc{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--faint);padding:0 4px;white-space:nowrap;flex-shrink:0}
.todbtn{font-family:'DM Mono',monospace;font-size:.52rem;padding:4px 8px;border:1.5px solid var(--today);background:transparent;border-radius:5px;color:var(--today);cursor:pointer;opacity:.85;white-space:nowrap;flex-shrink:0;-webkit-appearance:none}
.todbtn:active{background:rgba(224,149,106,.12);opacity:1}

/* Search bar */
.sbar{display:flex;align-items:center;gap:7px;padding:7px 14px;border-bottom:1px solid var(--faint);background:var(--paper);flex-shrink:0}
.sinp{flex:1;background:var(--bg);border:1.5px solid var(--faint);border-radius:6px;padding:8px 11px;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--ink);outline:none;-webkit-appearance:none;border-radius:6px}
.sinp:focus{border-color:var(--accent)}
.sinp::placeholder{color:var(--faint)}
.scls{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);cursor:pointer;padding:6px 10px;border:1.5px solid var(--faint);border-radius:5px;background:transparent;-webkit-appearance:none;min-height:34px}

/* ── BOTTOM NAV ── */
.bottom-nav{
  flex-shrink:0;
  background:var(--paper);border-top:1px solid var(--faint);
  display:flex;align-items:stretch;
  height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  padding-left:var(--safe-l);padding-right:var(--safe-r);
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;
}
.bottom-nav::-webkit-scrollbar{display:none}
.nav-tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:64px;flex:1;gap:3px;
  border:none;background:transparent;cursor:pointer;
  color:var(--muted);transition:color .15s;
  padding:8px 4px 6px;flex-shrink:0;
  scroll-snap-align:start;-webkit-appearance:none;
  touch-action:manipulation;
}
.nav-tab:active{color:var(--accent)}
.nav-tab.on{color:var(--accent)}
.nav-emoji{font-size:1.2rem;line-height:1;transition:transform .15s}
.nav-tab.on .nav-emoji{transform:scale(1.1)}
.nav-label{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.nav-badge{background:var(--red);color:white;border-radius:8px;padding:1px 5px;font-size:.42rem;font-family:'DM Mono',monospace;position:absolute;top:6px;right:calc(50% - 22px)}
.nav-tab{position:relative}

/* ── CALENDAR (static, no swipe) ── */
.cal-area{flex:1;overflow-y:auto;padding:9px;scrollbar-width:thin;scrollbar-color:var(--faint) transparent;-webkit-overflow-scrolling:touch}
.cal-wrap{/* no transform needed */}
.mb{margin-bottom:14px}
.ml{font-family:'DM Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px;padding:0 2px}
.wr{display:flex;gap:2px;margin-bottom:3px;align-items:flex-start}
.wl{font-family:'DM Mono',monospace;font-size:.48rem;color:var(--faint);width:20px;padding-top:5px;flex-shrink:0;text-align:right}
.wd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:1}
.dd{aspect-ratio:1;border-radius:50%;border:1.5px solid var(--faint);background:transparent;cursor:pointer;font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .13s;position:relative;-webkit-appearance:none;min-width:0;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.dd:active{border-color:var(--accent);color:var(--accent)}
.dd.tod{border-color:var(--today);color:var(--today);font-weight:500}
.dd.sel{background:var(--accent);border-color:var(--accent);color:#1a1814}
.dd.hn{background:var(--al);border-color:var(--has);color:var(--has)}
.dd.hn.sel,.dd.tod.sel{background:var(--accent);border-color:var(--accent);color:#1a1814}
.dd.hn::after{content:'';position:absolute;bottom:1px;right:1px;width:3px;height:3px;border-radius:50%;background:var(--has)}
.dd.hn.sel::after{background:rgba(26,24,20,.5)}
.dd.special{box-shadow:0 0 0 2px var(--special),0 0 10px 2px rgba(240,192,96,.35)!important;border-color:var(--special)!important;color:var(--special)!important}
.dd.special.sel{background:var(--special);color:#1a1814}
.dd.m1{border-color:#c0614a!important;background:rgba(192,97,74,.14)!important}
.dd.m2{border-color:#c49a6c!important;background:rgba(196,154,108,.12)!important}
.dd.m3{border-color:#c4aa6c!important;background:rgba(196,170,108,.12)!important}
.dd.m4{border-color:#6a9e7a!important;background:rgba(106,158,122,.12)!important}
.dd.m5{border-color:#6a8fa0!important;background:rgba(106,143,160,.12)!important}
.dd.emp{opacity:0;pointer-events:none}
.dd:disabled{opacity:.18;pointer-events:none}
.dh{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;margin-left:22px}
.dhh{font-family:'DM Mono',monospace;font-size:.46rem;text-align:center;color:var(--faint);text-transform:uppercase}

/* Calendar panel layout */
.cal-panel{display:flex;flex-direction:column;overflow:hidden;min-height:0}
.vtog{display:flex;margin:8px 8px 0;background:var(--bg);border-radius:6px;padding:2px;gap:2px;flex-shrink:0}
.vb{flex:1;padding:5px 0;border:none;background:transparent;font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);cursor:pointer;border-radius:4px;transition:all .15s;letter-spacing:.05em;text-transform:uppercase;-webkit-appearance:none}
.vb.on{background:var(--paper);color:var(--accent);box-shadow:0 1px 3px var(--shadow)}
.cal-streak{padding:8px 10px 4px;font-family:'DM Mono',monospace;font-size:.58rem;color:var(--accent);flex-shrink:0;text-align:center}
.cal-footer{flex-shrink:0;border-top:1px solid var(--faint)}
.settings-row{display:flex;gap:4px;padding:6px 8px}
.set-btn{flex:1;padding:6px 0;border:1.5px solid var(--faint);background:transparent;border-radius:5px;font-family:'DM Mono',monospace;font-size:.53rem;color:var(--muted);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;-webkit-appearance:none;min-height:34px}
.set-btn:active{border-color:var(--accent);color:var(--accent);background:var(--al)}
.bkbar{padding:6px 8px;display:flex;gap:4px}
.bkbtn{flex:1;padding:6px 0;border:1.5px solid var(--faint);background:transparent;border-radius:5px;font-family:'DM Mono',monospace;font-size:.53rem;color:var(--muted);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;-webkit-appearance:none;min-height:34px}
.bkbtn:active{border-color:var(--accent);color:var(--accent);background:var(--al)}

/* ── NOTES DAY VIEW ── */
.dv{max-width:660px;margin:0 auto;padding:20px calc(18px + var(--safe-l)) 80px calc(18px + var(--safe-r));width:100%}
.dnav{display:flex;align-items:center;gap:7px;margin-bottom:16px}
.backbtn{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted);cursor:pointer;padding:7px 11px;border:1.5px solid var(--faint);border-radius:6px;background:transparent;transition:all .15s;letter-spacing:.04em;text-transform:uppercase;-webkit-appearance:none;min-height:36px;white-space:nowrap}
.backbtn:active{border-color:var(--accent);color:var(--accent);background:var(--al)}
.arrbtn{width:34px;height:34px;border:1.5px solid var(--faint);background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;flex-shrink:0;-webkit-appearance:none}
.arrbtn:active{border-color:var(--accent);color:var(--accent)}
.arrbtn:disabled{opacity:.2;pointer-events:none}
.dtitle{font-size:calc(var(--fs)*1.3);font-weight:500;color:var(--ink);line-height:1.2;margin-bottom:3px}
.dtitle.tod{color:var(--today)}
.dsub{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);margin-bottom:14px}
.verse-block{background:var(--card);border:1px solid var(--faint);border-left:3px solid var(--accent);border-radius:7px;padding:11px 14px;margin-bottom:14px}
.vt{font-style:italic;font-size:calc(var(--fs)*.9);color:var(--muted);line-height:1.7;margin-bottom:3px}
.vr{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--accent)}
.moodrow{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.moodlbl{font-family:'DM Mono',monospace;font-size:.54rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;flex-shrink:0}
.moodbtn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--faint);background:transparent;cursor:pointer;font-size:.88rem;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-appearance:none;touch-action:manipulation}
.moodbtn:active{transform:scale(1.15)}
.moodbtn.sel{border-width:2px;transform:scale(1.1)}
.moodbtn[data-m="1"].sel{border-color:#c0614a;background:rgba(192,97,74,.18)}
.moodbtn[data-m="2"].sel{border-color:#c49a6c;background:rgba(196,154,108,.18)}
.moodbtn[data-m="3"].sel{border-color:#c4aa6c;background:rgba(196,170,108,.18)}
.moodbtn[data-m="4"].sel{border-color:#6a9e7a;background:rgba(106,158,122,.18)}
.moodbtn[data-m="5"].sel{border-color:#6a8fa0;background:rgba(106,143,160,.18)}
.pzone{margin-bottom:14px}
.pdrop{border:1.5px dashed var(--faint);border-radius:7px;padding:14px;text-align:center;cursor:pointer;transition:all .15s;color:var(--faint);font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.04em;min-height:52px;display:flex;align-items:center;justify-content:center;gap:6px}
.pdrop:active,.pdrop.over{border-color:var(--accent);color:var(--accent);background:var(--al)}
.pprev{position:relative;display:inline-block;max-width:100%}
.pprev img{max-width:100%;max-height:240px;border-radius:7px;display:block;object-fit:cover}
.prm{position:absolute;top:6px;right:6px;width:26px;height:26px;background:rgba(26,24,20,.85);border:1px solid var(--faint);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.prm:active{background:var(--red);border-color:var(--red);color:white}
.slbl{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.nta{width:100%;background:transparent;border:none;outline:none;font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*1.0);line-height:1.85;color:var(--ink);resize:none;caret-color:var(--accent);min-height:120px;display:block}
.nta::placeholder{color:var(--faint);font-style:italic}
.ndiv{border:none;border-top:1px solid var(--faint);margin:16px 0}
.grat-inputs{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.grow{display:flex;align-items:center;gap:7px}
.gnum{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--faint);width:12px;flex-shrink:0}
.ginp{flex:1;background:transparent;border:none;border-bottom:1px solid var(--faint);outline:none;font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*.9);color:var(--ink);padding:6px 2px;caret-color:var(--accent);transition:border-color .15s;-webkit-appearance:none;border-radius:0}
.ginp:focus{border-bottom-color:var(--accent)}
.ginp::placeholder{color:var(--faint);font-style:italic}
.pvw{font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*1.0);line-height:1.85;color:var(--ink)}
.pvw h1{font-size:calc(var(--fs)*1.4);font-weight:500;margin:0 0 .5em}
.pvw h2{font-size:calc(var(--fs)*1.15);font-weight:500;margin:1em 0 .35em}
.pvw h3{font-size:calc(var(--fs)*.98);font-weight:500;margin:.9em 0 .28em}
.pvw p{margin:0 0 .8em}
.pvw strong{font-weight:600}
.pvw em{font-style:italic;color:var(--muted)}
.pvw ul,.pvw ol{margin:.25em 0 .8em 1.2em}
.pvw li{margin-bottom:.2em}
.pvw blockquote{border-left:3px solid var(--accent);margin:.6em 0;padding:.15em 0 .15em .9em;color:var(--muted);font-style:italic}
.pvw code{font-family:'DM Mono',monospace;font-size:.82em;background:var(--al);padding:.08em .28em;border-radius:3px;color:var(--accent)}
.pvw hr{border:none;border-top:1px solid var(--faint);margin:.9em 0}
.lylast,.lyann{background:var(--card);border:1px solid var(--faint);border-radius:7px;padding:11px 14px;margin-bottom:14px;cursor:pointer}
.lylast{border-left:3px solid var(--muted)}
.lyann{border-left:3px solid var(--special);background:rgba(240,192,96,.07)}
.ly-lbl{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.lyann .ly-lbl{color:var(--special)}
.ly-body{font-size:calc(var(--fs)*.88);color:var(--muted);font-style:italic;line-height:1.65}
.srw{padding:14px 18px;max-width:660px;margin:0 auto;width:100%}
.sri{padding:11px 13px;border-radius:6px;cursor:pointer;margin-bottom:5px;border:1px solid var(--faint);transition:background .15s}
.sri:active{background:var(--paper)}
.srd{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--accent);margin-bottom:3px}
.srp{font-size:.84rem;color:var(--muted);line-height:1.5}
.srp mark{background:rgba(196,154,108,.2);color:var(--accent);border-radius:2px;padding:0 2px}

/* ── MASTER ── */
.master-area{max-width:660px;margin:0 auto;padding:20px calc(18px + var(--safe-l)) 80px calc(18px + var(--safe-r));width:100%;display:flex;flex-direction:column;min-height:100%}
.master-ta{width:100%;background:transparent;border:none;outline:none;font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*1.0);line-height:1.9;color:var(--ink);resize:none;caret-color:var(--accent);min-height:60vh;flex:1}
.master-ta::placeholder{color:var(--faint);font-style:italic}
.master-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--faint)}
.master-title{font-size:calc(var(--fs)*1.05);font-weight:500}
.master-wc{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted)}

/* ── GENERIC PANEL ── */
.gw{max-width:620px;margin:0 auto;padding:20px calc(18px + var(--safe-l)) 80px calc(18px + var(--safe-r));width:100%}
.stitle{font-size:calc(var(--fs)*1.0);font-weight:500;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.stitle-sub{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);font-weight:400}
.af{background:var(--card);border:1px solid var(--faint);border-radius:9px;padding:13px;margin-bottom:16px}
.frow{display:flex;gap:6px;margin-bottom:6px}
.fi{flex:1;background:var(--bg);border:1.5px solid var(--faint);border-radius:6px;padding:9px 11px;font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*.9);color:var(--ink);outline:none;-webkit-appearance:none;border-radius:6px;min-height:38px}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--faint);font-style:italic}
.fta{width:100%;resize:none;min-height:52px;line-height:1.5}
.abtn{padding:9px 16px;background:var(--accent);border:none;border-radius:6px;font-family:'DM Mono',monospace;font-size:.58rem;color:#1a1814;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;white-space:nowrap;align-self:flex-end;-webkit-appearance:none;min-height:38px}
.abtn:active{background:var(--today)}
.filrow{display:flex;gap:3px;margin-bottom:14px;flex-wrap:wrap}
.pf{padding:5px 11px;border:1.5px solid var(--faint);background:transparent;border-radius:14px;font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);cursor:pointer;transition:all .15s;-webkit-appearance:none;min-height:30px}
.pf:active,.pf.on{background:var(--accent);border-color:var(--accent);color:#1a1814}

/* Prayer */
.pitem{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:12px 13px;margin-bottom:6px;display:flex;gap:9px;align-items:flex-start}
.pitem.done{opacity:.5;border-style:dashed}
.pchk{width:20px;height:20px;border:1.5px solid var(--faint);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;min-width:20px}
.pchk:active{border-color:var(--green)}
.pchk.ok{background:var(--green);border-color:var(--green)}
.pchk.ok::after{content:'✓';font-size:.5rem;color:white;font-family:'DM Mono',monospace}
.pbody{flex:1;min-width:0}
.pname{font-weight:500;font-size:calc(var(--fs)*.9);margin-bottom:2px}
.pname.done{text-decoration:line-through;color:var(--muted)}
.preq{font-size:calc(var(--fs)*.82);color:var(--muted);line-height:1.5}
.pmeta{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--faint);margin-top:4px}
.pbadge{font-family:'DM Mono',monospace;font-size:.48rem;color:var(--green);background:var(--gl);padding:2px 5px;border-radius:7px;margin-top:3px;display:inline-block}
.xbtn{width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center;border-radius:3px;transition:all .15s;flex-shrink:0;-webkit-appearance:none;padding:0}
.xbtn:active{color:var(--red);background:rgba(192,97,74,.1)}

/* Habits */
.hcfg{background:var(--card);border:1px solid var(--faint);border-radius:9px;padding:13px;margin-bottom:18px}
.hcfg-t{font-family:'DM Mono',monospace;font-size:.54rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.hadd{display:flex;gap:5px}
.hei{width:40px;background:var(--bg);border:1.5px solid var(--faint);border-radius:6px;padding:8px 3px;font-size:1rem;text-align:center;outline:none;color:var(--ink);-webkit-appearance:none;min-height:38px}
.hei:focus{border-color:var(--accent)}
.hni{flex:1;background:var(--bg);border:1.5px solid var(--faint);border-radius:6px;padding:8px 10px;font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*.88);color:var(--ink);outline:none;-webkit-appearance:none;min-height:38px}
.hni:focus{border-color:var(--accent)}
.hni::placeholder{color:var(--faint);font-style:italic}
.hwhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hwt{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.hwnav{display:flex;gap:3px}
.hwnb{width:26px;height:26px;border:1.5px solid var(--faint);background:transparent;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);-webkit-appearance:none}
.hwnb:active{border-color:var(--accent);color:var(--accent)}
.hgrid{display:flex;flex-direction:column;gap:7px}
.hrow{display:flex;align-items:center;gap:6px}
.hrlbl{display:flex;align-items:center;gap:4px;width:140px;flex-shrink:0}
.hemoji{font-size:.9rem;width:20px;text-align:center}
.hrname{font-size:.84rem;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.hdelbtn{width:18px;height:18px;border:none;background:transparent;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center;-webkit-appearance:none;padding:0}
.hdelbtn:active{color:var(--red)}
.hdays{display:flex;gap:3px;flex:1}
.hcell{flex:1;aspect-ratio:1;border-radius:4px;border:1.5px solid var(--faint);background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .13s;max-width:36px;touch-action:manipulation}
.hcell:active{border-color:var(--accent)}
.hcell.done{background:var(--al);border-color:var(--has)}
.hcell.done-today{background:var(--al);border-color:var(--accent)}
.hcell .hcd{font-family:'DM Mono',monospace;font-size:.44rem;color:var(--faint)}
.hcell .hck{font-size:.65rem;opacity:0}
.hcell.done .hck,.hcell.done-today .hck{opacity:1}
.hcell.fut{opacity:.2;pointer-events:none}
.hstat{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--accent);margin-left:auto;white-space:nowrap}

/* Deadlines */
.dlform{background:var(--card);border:1px solid var(--faint);border-radius:9px;padding:13px;margin-bottom:16px}
.dlgrid{display:grid;grid-template-columns:1fr auto;gap:6px;margin-bottom:6px}
.ddi{background:var(--bg);border:1.5px solid var(--faint);border-radius:6px;padding:8px 10px;font-family:'DM Mono',monospace;font-size:.68rem;color:var(--ink);outline:none;color-scheme:dark;-webkit-appearance:none;min-height:38px}
:root.light .ddi{color-scheme:light}
.ddi:focus{border-color:var(--accent)}
.dlitem{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:flex-start;gap:9px}
.dlitem.ov{border-color:var(--red);background:rgba(192,97,74,.06)}
.dlitem.ds{border-color:var(--yellow);background:rgba(196,170,108,.06)}
.dlitem.dn{opacity:.45;border-style:dashed}
.dlchk{width:20px;height:20px;border:1.5px solid var(--faint);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;min-width:20px}
.dlchk:active{border-color:var(--green)}
.dlchk.ok{background:var(--green);border-color:var(--green)}
.dlchk.ok::after{content:'✓';font-size:.5rem;color:white;font-family:'DM Mono',monospace}
.dlbody{flex:1;min-width:0}
.dltitle{font-size:calc(var(--fs)*.9);font-weight:500;margin-bottom:2px}
.dltitle.dn{text-decoration:line-through;color:var(--muted)}
.dlwhen{font-family:'DM Mono',monospace;font-size:.56rem;margin-top:2px}
.dlwhen.ov{color:var(--red)}.dlwhen.ds{color:var(--yellow)}.dlwhen.ok{color:var(--faint)}
.dlbadge{display:inline-block;font-family:'DM Mono',monospace;font-size:.48rem;padding:2px 5px;border-radius:7px;margin-top:2px}
.dlbadge.ov{background:rgba(192,97,74,.18);color:var(--red)}
.dlbadge.ds{background:rgba(196,170,108,.14);color:var(--yellow)}

/* People */
.ppl-item{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:12px 13px;margin-bottom:7px;display:flex;align-items:flex-start;gap:9px}
.ppl-item.ov{border-color:var(--red)!important}
.ppl-item.warn{border-color:var(--yellow)!important}
.ppl-av{width:38px;height:38px;border-radius:50%;background:var(--al);border:2px solid var(--faint);display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;min-width:38px}
.ppl-item.ov .ppl-av{border-color:var(--red)}
.ppl-item.warn .ppl-av{border-color:var(--yellow)}
.ppl-body{flex:1;min-width:0}
.ppl-name{font-weight:500;font-size:calc(var(--fs)*.92);margin-bottom:2px}
.ppl-rel{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);margin-bottom:3px}
.ppl-cd{font-family:'DM Mono',monospace;font-size:.55rem;margin-bottom:2px}
.ppl-cd.ok{color:var(--green)}.ppl-cd.warn{color:var(--yellow)}.ppl-cd.ov{color:var(--red)}
.ppl-last{font-family:'DM Mono',monospace;font-size:.49rem;color:var(--faint)}
.ppl-acts{display:flex;gap:4px;align-items:center;flex-shrink:0}
.ppl-cb{padding:6px 10px;background:var(--accent);border:none;border-radius:5px;font-family:'DM Mono',monospace;font-size:.52rem;color:#1a1814;cursor:pointer;white-space:nowrap;-webkit-appearance:none;min-height:32px}
.ppl-cb:active{background:var(--today)}
.freq-sel{background:var(--bg);border:1.5px solid var(--faint);border-radius:6px;padding:8px 8px;font-family:'DM Mono',monospace;font-size:.62rem;color:var(--ink);outline:none;color-scheme:dark;cursor:pointer;-webkit-appearance:none;min-height:38px}
:root.light .freq-sel{color-scheme:light}
.freq-sel:focus{border-color:var(--accent)}

/* Scripture */
.sc-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.sc-group-sel{background:var(--bg);border:1.5px solid var(--faint);border-radius:6px;padding:6px 10px;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--ink);outline:none;color-scheme:dark;cursor:pointer;-webkit-appearance:none}
:root.light .sc-group-sel{color-scheme:light}
.sc-group-sel:focus{border-color:var(--accent)}
.sc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:9px;margin-top:4px}
.sc-card{background:var(--card);border:1px solid var(--faint);border-radius:9px;padding:13px;cursor:pointer;transition:all .2s;position:relative;min-height:95px;touch-action:manipulation}
.sc-card:active{border-color:var(--accent)}
.sc-card.mem{border-color:var(--green);opacity:.65}
.sc-card.pinned{border-color:var(--special);box-shadow:0 0 0 1px var(--special),0 0 8px rgba(240,192,96,.2)}
.sc-front{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:75px;text-align:center}
.sc-ref{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--accent);letter-spacing:.05em;margin-bottom:4px}
.sc-group-tag{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--faint);margin-bottom:5px}
.sc-hint{font-size:.73rem;color:var(--faint);font-style:italic}
.sc-back{display:none;font-style:italic;font-size:calc(var(--fs)*.88);color:var(--ink);line-height:1.7}
.sc-card.flipped .sc-front{display:none}
.sc-card.flipped .sc-back{display:block}
.sc-foot{display:flex;align-items:center;gap:4px;margin-top:9px;padding-top:7px;border-top:1px solid var(--faint)}
.sc-mb{font-family:'DM Mono',monospace;font-size:.5rem;padding:3px 8px;border:1.5px solid var(--faint);background:transparent;border-radius:12px;cursor:pointer;color:var(--muted);-webkit-appearance:none;min-height:26px}
.sc-mb:active{border-color:var(--green);color:var(--green)}
.sc-card.mem .sc-mb{border-color:var(--green);color:var(--green);background:var(--gl)}
.sc-pin-btn{font-family:'DM Mono',monospace;font-size:.5rem;padding:3px 7px;border:1.5px solid var(--faint);background:transparent;border-radius:12px;cursor:pointer;color:var(--muted);-webkit-appearance:none;min-height:26px}
.sc-pin-btn:active,.sc-card.pinned .sc-pin-btn{border-color:var(--special);color:var(--special)}
.sc-spacer{flex:1}
.sc-af{background:var(--card);border:1px solid var(--faint);border-radius:9px;padding:13px;margin-bottom:16px}
.sc-hint2{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--faint);margin-bottom:10px;letter-spacing:.04em}
.lempty{color:var(--faint);font-style:italic;font-size:calc(var(--fs)*.86);padding:26px 0;text-align:center}

/* QC FAB */
.qcfab{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 14px);right:calc(18px + var(--safe-r));width:46px;height:46px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px var(--shadow);transition:all .2s;z-index:50;color:#1a1814;-webkit-appearance:none;touch-action:manipulation}
.qcfab:active{background:var(--today);transform:scale(1.08)}
.qcmod{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 70px);right:calc(16px + var(--safe-r));width:min(295px,calc(100vw - 36px));background:var(--paper);border:1px solid var(--faint);border-radius:12px;padding:13px;box-shadow:0 8px 32px var(--shadow);z-index:51;display:none}
.qcmod.show{display:block;animation:pu .15s ease}
@keyframes pu{from{opacity:0;transform:translateY(7px) scale(.97)}to{opacity:1;transform:none}}
.qclbl{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.qcta{width:100%;background:var(--bg);border:1.5px solid var(--faint);border-radius:7px;padding:9px 11px;font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*.9);color:var(--ink);outline:none;resize:none;min-height:75px;caret-color:var(--accent);line-height:1.65;-webkit-appearance:none}
.qcta:focus{border-color:var(--accent)}
.qcta::placeholder{color:var(--faint);font-style:italic}
.qcbtns{display:flex;gap:5px;margin-top:7px;justify-content:flex-end}
.qccnc{font-family:'DM Mono',monospace;font-size:.56rem;padding:6px 10px;border:1.5px solid var(--faint);background:transparent;border-radius:5px;color:var(--muted);cursor:pointer;-webkit-appearance:none;min-height:32px}
.qcsav{font-family:'DM Mono',monospace;font-size:.56rem;padding:6px 12px;border:none;background:var(--accent);border-radius:5px;color:#1a1814;cursor:pointer;-webkit-appearance:none;min-height:32px}
.qcsav:active{background:var(--today)}

/* Confirm */
.cnfov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center;padding:20px}
.cnfov.show{display:flex}
.cnfbox{background:var(--paper);border-radius:12px;padding:22px 24px;max-width:280px;width:100%;text-align:center;box-shadow:0 20px 60px var(--shadow);border:1px solid var(--faint)}
.cnfbox p{font-size:calc(var(--fs)*.83);color:var(--muted);margin-bottom:15px;line-height:1.5}
.cnfbox strong{color:var(--ink)}
.cnfbtns{display:flex;gap:7px;justify-content:center}
.btn{padding:8px 14px;border-radius:6px;border:1.5px solid;font-family:'DM Mono',monospace;font-size:.6rem;cursor:pointer;letter-spacing:.04em;-webkit-appearance:none;min-height:36px}
.btnc{border-color:var(--faint);background:transparent;color:var(--muted)}
.btnd{border-color:var(--red);background:var(--red);color:white}

/* Toast */
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--bg);font-family:'DM Mono',monospace;font-size:.6rem;padding:7px 15px;border-radius:16px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap;z-index:200;letter-spacing:.03em;max-width:calc(100vw - 40px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.dv,.pitem,.dlitem,.hrow,.ppl-item,.sc-card{animation:fadeUp .16s ease both}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <button class="ib" id="sBtn" onclick="togSearch()" style="display:none">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4"/><path d="M10 10l3.5 3.5"/></svg>
    </button>
    <div class="tb-title" id="tbTitle">Notes</div>
    <button class="ib" id="pvBtn" onclick="togPreview()" style="display:none">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>
    </button>
    <span class="si" id="si" style="font-family:'DM Mono',monospace;font-size:.52rem;color:var(--faint);letter-spacing:.04em;display:none">saved</span>
    <button class="ib" id="themeBtn" onclick="togTheme()">☀️</button>
    <button class="ib" onclick="cycleFont()">Aa</button>
  </div>

  <!-- BODY AREA -->
  <div class="body-area">

    <!-- SANCTUARY (swipe right panel) -->
    <div class="sanctuary" id="sanctuary">
      <div class="sanct-close"><button class="sanct-close-btn" onclick="closeSanctuary()">← Close</button></div>

      <!-- Coptic Calendar -->
      <div class="coptic-block">
        <div class="coptic-date-label">☩ Coptic Calendar</div>
        <div class="coptic-date" id="copticDate">Loading…</div>
        <div class="coptic-season" id="copticSeason"></div>
        <div class="coptic-saint-label">Feast / Saint</div>
        <div class="coptic-saint" id="copticSaint">—</div>
      </div>

      <!-- Featured Psalm -->
      <div class="psalm-block">
        <div class="psalm-header">
          <div class="psalm-title">✦ My Psalm</div>
          <button class="psalm-edit-btn" onclick="togPsalmEdit()">Edit</button>
        </div>
        <div id="psalmDisplay">
          <div class="psalm-empty">Tap Edit to add your psalm.</div>
        </div>
        <div class="psalm-editor" id="psalmEditor">
          <textarea class="psalm-ta" id="psalmTA" placeholder="Paste or type your psalm here…" rows="8"></textarea>
          <input class="psalm-ref-inp" id="psalmRefInp" placeholder="Reference — e.g. Psalm 23 (NKJV)">
          <button class="psalm-save-btn" onclick="savePsalm()">Save</button>
        </div>
      </div>
    </div>

    <!-- MAIN PAGES -->
    <div class="pages" id="pages">

      <!-- Calendar page -->
      <div class="page hide" id="page-cal">
        <div class="cal-panel">
          <div class="vtog">
            <button class="vb on" id="vbW" onclick="setView('w')">Week</button>
            <button class="vb" id="vbM" onclick="setView('m')">Month</button>
          </div>
          <div class="cal-streak" id="calStreak">0🔥</div>
          <div class="cal-area" id="calArea"></div>
          <div class="cal-footer">
            <div class="settings-row">
              <button class="set-btn" id="yrBtn" onclick="goTab('notes');setTimeout(showYearlyReview,80)">✦ Year</button>
            </div>
            <div class="bkbar">
              <button class="bkbtn" onclick="exportAll()">
                <svg width="8" height="8" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10v3h10v-3M8 2v7M5 6l3 3 3-3"/></svg>Backup

// DATE UTILS
// ════════════════════════════════════════════
function fd(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function dl(s){return pd(s).toLocaleDateString('en-AU',{weekday:'long'});}
function fl(s){return pd(s).toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sow(d){const dn=d.getDay(),diff=dn===0?-6:1-dn,m=new Date(d);m.setDate(d.getDate()+diff);return m;}
function wn(d){const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-dn);const y=new Date(Date.UTC(u.getUTCFullYear(),0,1));return Math.ceil((((u-y)/86400000)+1)/7);}
function nDates(){return Object.keys(notes).filter(k=>notes[k]&&notes[k].trim());}
function streak(){let s=0,d=new Date();if(!notes[fd(d)])d=addD(d,-1);while(notes[fd(d)]){s++;d=addD(d,-1);}return s;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function wc(s){return s&&s.trim()?s.trim().split(/\s+/).length:0;}

// ════════════════════════════════════════════
// COPTIC CALENDAR
// ════════════════════════════════════════════
const COPTIC_MONTHS=['Thout','Paopi','Hathor','Koiak','Tobi','Meshir','Paremhat','Parmouti','Pashons','Paoni','Epip','Mesori','Nasie'];
const COPTIC_SEASONS={
  Thout:'Season of Inundation',Paopi:'Season of Inundation',Hathor:'Season of Inundation',Koiak:'Season of Inundation',
  Tobi:'Season of Sowing',Meshir:'Season of Sowing',Paremhat:'Season of Sowing',Parmouti:'Season of Sowing',
  Pashons:'Season of Harvest',Paoni:'Season of Harvest',Epip:'Season of Harvest',Mesori:'Season of Harvest',Nasie:'Season of Harvest'
};
// Key Coptic feast days by month/day (approximate, common feasts)
const COPTIC_FEASTS={
  '1/1':'Nayrouz — Coptic New Year','1/10':'Feast of St. Matthew the Apostle','1/29':'Feast of St. Michael the Archangel',
  '2/1':'Feast of St. George','2/17':'Feast of St. Ignatius','2/28':'Feast of St. Athanasius',
  '3/6':'Feast of Pope Cyril I','3/22':'Feast of St. George (major)','3/29':'Feast of St. Mark (Reading)',
  '4/1':'Feast of St. Theodore','4/24':'Feast of St. George',
  '5/8':'Feast of St. Michael','5/25':'Feast of the Virgin Mary',
  '6/2':'Feast of the Apostles','6/12':'Feast of the Ascension (approx)',
  '7/7':'Feast of St. Peter & Paul','7/21':'Feast of St. Mary Magdalene',
  '8/15':'Assumption of the Virgin Mary','8/22':'Feast of St. Bartholomew',
  '9/9':'Feast of St. Michael','9/12':'Feast of the Holy Cross (prep)',
  '10/10':'Feast of St. Mark','10/17':'Feast of St. Luke',
  '11/1':'Feast of All Saints','11/12':'Feast of the Archangel Michael',
  '12/6':'Feast of St. Nicholas','12/25':'Nativity of Christ (Coptic Kiahk)',
};

function gregorianToCoptic(gYear,gMonth,gDay){
  // Coptic calendar conversion
  const gDate=new Date(gYear,gMonth-1,gDay);
  const gJD=Math.floor((gDate-new Date(1970,0,1))/864e5)+2440588;
  let cYear,cMonth,cDay;
  // Julian Day for Coptic epoch (29 Aug 284 AD = JD 1825030)
  const copticEpoch=1825030;
  const jd=gJD-copticEpoch;
  cYear=Math.floor((jd-1)/365.25);
  const rem=jd-Math.floor(cYear*365.25);
  cMonth=Math.floor((rem-1)/30);
  cDay=rem-cMonth*30;
  if(cDay<=0){cMonth--;cDay+=30;}
  if(cMonth<0){cYear--;cMonth+=13;}
  if(cMonth>=13){cMonth=12;cDay=rem-360;}
  cMonth=Math.max(0,Math.min(12,cMonth));
  cDay=Math.max(1,Math.min(cMonth===12?5:30,cDay));
  cYear=Math.max(1,cYear);
  return{year:cYear,month:cMonth,day:cDay};
}

function initCopticCalendar(){
  const now=new Date();
  const c=gregorianToCoptic(now.getFullYear(),now.getMonth()+1,now.getDate());
  const mName=COPTIC_MONTHS[c.month]||'Nasie';
  document.getElementById('copticDate').textContent=`${c.day} ${mName} ${c.year} AM`;
  document.getElementById('copticSeason').textContent=COPTIC_SEASONS[mName]||'';
  // Check feast
  const key=`${now.getMonth()+1}/${now.getDate()}`;
  const feast=COPTIC_FEASTS[key]||'';
  // Also show Coptic month/day feast
  const copticKey=`${c.month+1}/${c.day}`;
  document.getElementById('copticSaint').textContent=feast||'No major feast today';
}

// ════════════════════════════════════════════
// SWIPE GESTURES
// ════════════════════════════════════════════
(function(){
  let tx=0,ty=0,swiping=false,edgeSwipe=false;
  const pages=document.getElementById('pages');
  pages.addEventListener('touchstart',e=>{
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;swiping=true;
    edgeSwipe=tx<32; // only open sanctuary from left edge
  },{passive:true});
  pages.addEventListener('touchmove',e=>{
    if(!swiping)return;
    const dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)*3&&Math.abs(dx)>48){
      if(dx>0&&!sanctuaryOpen&&edgeSwipe){openSanctuary();swiping=false;}
      else if(dx<0&&sanctuaryOpen){closeSanctuary();swiping=false;}
    }
  },{passive:true});
  pages.addEventListener('touchend',()=>{swiping=false;edgeSwipe=false;},{passive:true});

  // Swipe to close sanctuary
  const sanct=document.getElementById('sanctuary');
  let sTx=0;
  sanct.addEventListener('touchstart',e=>{sTx=e.touches[0].clientX;},{passive:true});
  sanct.addEventListener('touchmove',e=>{if(e.touches[0].clientX-sTx<-50)closeSanctuary();},{passive:true});
})();

function fmt(type){
  if(isPrev)return;
  const ta=document.getElementById('mta');if(!ta)return;
  ta.focus();
  const liveS=ta.selectionStart,liveE=ta.selectionEnd;
  const s=(liveS===liveE&&_lastSel.end>_lastSel.start)?_lastSel.start:liveS;
  const e=(liveS===liveE&&_lastSel.end>_lastSel.start)?_lastSel.end:liveE;
  ta.setSelectionRange(s,e);
  const sel=ta.value.substring(s,e),bef=ta.value.substring(0,s),aft=ta.value.substring(e);
  switch(type){
    case 'bold':ta.value=bef+`**${sel||'bold text'}**`+aft;ta.selectionStart=s+(sel?0:2);ta.selectionEnd=s+(sel?sel.length+4:11);break;
    case 'italic':ta.value=bef+`*${sel||'italic text'}*`+aft;ta.selectionStart=s+(sel?0:1);ta.selectionEnd=s+(sel?sel.length+2:12);break;
    case 'h1':ipfx(ta,'# ');break;case 'h2':ipfx(ta,'## ');break;case 'h3':ipfx(ta,'### ');break;
    case 'ul':ipfx(ta,'- ');break;case 'ol':ipfx(ta,'1. ');break;case 'task':ipfx(ta,'- [ ] ');break;
    case 'quote':ipfx(ta,'> ');break;
    case 'hr':{const nl=bef.endsWith('\n')||bef===''?'':'\n';ta.value=bef+nl+'\n---\n\n'+aft;ta.selectionStart=ta.selectionEnd=s+nl.length+6;break;}
  }
  ta.dispatchEvent(new Event('input'));ta.focus();autoR(ta);
  _lastSel={start:ta.selectionStart,end:ta.selectionEnd};
}
function ipfx(ta,pfx){const s=ta.selectionStart,bef=ta.value.substring(0,s),aft=ta.value.substring(s),ls=bef.lastIndexOf('\n')+1,lc=bef.substring(ls);if(lc.startsWith(pfx)){ta.value=bef.substring(0,ls)+lc.substring(pfx.length)+aft;ta.selectionStart=ta.selectionEnd=s-pfx.length;}else{ta.value=bef.substring(0,ls)+pfx+lc+aft;ta.selectionStart=ta.selectionEnd=s+pfx.length;}}
function onKD(e){const ta=e.target;if(e.key==='Tab'){e.preventDefault();const s=ta.selectionStart;ta.value=ta.value.substring(0,s)+'  '+ta.value.substring(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+2;ta.dispatchEvent(new Event('input'));return;}if(e.key==='Enter'){const s=ta.selectionStart,bef=ta.value.substring(0,s),ls=bef.lastIndexOf('\n')+1,line=bef.substring(ls);const ul=line.match(/^(\s*)(- \[[ x]\] |- )/),ol=line.match(/^(\s*)(\d+)\. /);if(ul){e.preventDefault();if(line===ul[0]){ta.value=ta.value.substring(0,ls)+'\n'+ta.value.substring(s);ta.selectionStart=ta.selectionEnd=ls+1;}else{const ins='\n'+ul[1]+(ul[2].includes('[ ]')||ul[2].includes('[x]')?'- [ ] ':'- ');ta.value=bef+ins+ta.value.substring(s);ta.selectionStart=ta.selectionEnd=s+ins.length;}ta.dispatchEvent(new Event('input'));autoR(ta);}else if(ol){e.preventDefault();const ins='\n'+ol[1]+(parseInt(ol[2])+1)+'. ';ta.value=bef+ins+ta.value.substring(s);ta.selectionStart=ta.selectionEnd=s+ins.length;ta.dispatchEvent(new Event('input'));autoR(ta);}}}

function renderMD(md){if(!md||!md.trim())return'';let h=esc(md);h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');h=h.replace(/^---$/gm,'<hr>');h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');h=h.replace(/^- \[x\] (.+)$/gm,'<li style="list-style:none"><input type="checkbox" checked disabled style="margin-right:5px;accent-color:var(--accent)"> <s style="opacity:.5">$1</s></li>');h=h.replace(/^- \[ \] (.+)$/gm,'<li style="list-style:none"><input type="checkbox" disabled style="margin-right:5px;accent-color:var(--accent)"> $1</li>');h=h.replace(/^- (.+)$/gm,'<li>$1</li>');h=h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');h=h.replace(/(<li[\s\S]*?<\/li>)(\n<li[\s\S]*?<\/li>)*/g,m=>`<ul>${m}</ul>`);h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');h=h.replace(/`(.+?)`/g,'<code>$1</code>');const lines=h.split('\n'),bt=['<h1','<h2','<h3','<hr','<ul','</ul','<bl','<li'];let res=[],para=[];for(const line of lines){const iB=bt.some(t=>line.startsWith(t))||line==='';if(iB){if(para.length){res.push('<p>'+para.join(' ')+'</p>');para=[];}if(line)res.push(line);}else para.push(line);}if(para.length)res.push('<p>'+para.join(' ')+'</p>');return res.join('\n');}

function doSearch(q){const res=document.getElementById('sres'),dv=document.getElementById('dv');if(!q.trim()){res.style.display='none';dv.style.display='';return;}res.style.display='';dv.style.display='none';const term=q.toLowerCase(),matches=Object.entries(notes).filter(([,v])=>v&&v.toLowerCase().includes(term)).sort((a,b)=>b[0].localeCompare(a[0]));if(!matches.length){document.getElementById('srw').innerHTML='<div style="color:var(--faint);font-style:italic;font-size:.86rem;padding:36px 0;text-align:center">No entries match.</div>';return;}document.getElementById('srw').innerHTML=matches.map(([date,text])=>{const label=pd(date).toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});const idx=text.toLowerCase().indexOf(term),st=Math.max(0,idx-50),en=Math.min(text.length,idx+85);let snip=(st>0?'…':'')+text.substring(st,en)+(en<text.length?'…':'');snip=esc(snip).replace(new RegExp(esc(q),'gi'),m=>`<mark>${m}</mark>`);return`<div class="sri" onclick="goRes('${date}')"><div class="srd">${label}</div><div class="srp">${snip}</div></div>`;}).join('');}

function addHabit(){const e=document.getElementById('hemo').value.trim()||'✦',n=document.getElementById('hnam').value.trim();if(!n)return;habits.push({id:Date.now().toString(),emoji:e,name:n});P(K.habits,habits);document.getElementById('hemo').value='';document.getElementById('hnam').value='';renderHabits();}
function togHabit(hid,ds){if(!hlog[ds])hlog[ds]={};hlog[ds][hid]=!hlog[ds][hid];if(!hlog[ds][hid])delete hlog[ds][hid];if(!Object.keys(hlog[ds]).length)delete hlog[ds];P(K.hlog,hlog);renderHabits();}
function shiftHW(d){hwOff+=d;if(hwOff>0)hwOff=0;renderHabits();}
function renderHabits(){if(!habits.length){document.getElementById('hgrid').innerHTML='<div class="lempty">Add a habit above to start tracking.</div>';document.getElementById('hwt').textContent='';return;}const today=new Date(),ws=sow(addD(today,hwOff*7));const days=Array.from({length:7},(_,i)=>addD(ws,i));const DN=['M','T','W','T','F','S','S'];document.getElementById('hwnext').disabled=hwOff===0;document.getElementById('hwt').textContent=`${days[0].toLocaleDateString('en-AU',{day:'numeric',month:'short'})} – ${days[6].toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}`;const grid=document.getElementById('hgrid');let html=`<div class="hrow"><div class="hrlbl" style="opacity:0">x</div><div class="hdays">${days.map((d,i)=>{const ds=fd(d),isT=ds===TODAY;return`<div class="hcell" style="cursor:default;pointer-events:none;border-color:${isT?'var(--accent)':'transparent'};background:transparent"><div class="hcd" style="color:${isT?'var(--accent)':'var(--faint)'};font-size:.42rem">${DN[i]}<br>${d.getDate()}</div></div>`;}).join('')}</div></div>`;habits.forEach(h=>{const dc=days.filter(d=>{const ds=fd(d);return hlog[ds]&&hlog[ds][h.id];}).length;html+=`<div class="hrow"><div class="hrlbl"><span class="hemoji">${h.emoji}</span><span class="hrname">${esc(h.name)}</span><button class="hdelbtn" onclick="delHabit('${h.id}')"><svg width="7" height="7" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 1l8 8M9 1l-8 8"/></svg></button></div><div class="hdays">${days.map(d=>{const ds=fd(d),fut=d>today&&ds!==TODAY,done=hlog[ds]&&hlog[ds][h.id],isT=ds===TODAY;return`<div class="hcell ${done?(isT?'done-today':'done'):''} ${fut?'fut':''}" onclick="${fut?'':` togHabit('${h.id}','${ds}')`}"><div class="hck">${done?'✓':''}</div></div>`;}).join('')}</div><span class="hstat">${dc}/7</span></div>`;});grid.innerHTML=html;}
function delHabit(id){habits=habits.filter(h=>h.id!==id);P(K.habits,habits);renderHabits();}

function addDL(){const t=document.getElementById('dltit').value.trim(),d=document.getElementById('dldat').value,n=document.getElementById('dlnot').value.trim();if(!t||!d)return;deadlines.push({id:Date.now().toString(),title:t,date:d,note:n,done:false});deadlines.sort((a,b)=>a.date.localeCompare(b.date));P(K.dl,deadlines);document.getElementById('dltit').value='';document.getElementById('dlnot').value='';renderDL();updateDLBadge();}
function togDL(id){const d=deadlines.find(x=>x.id===id);if(d)d.done=!d.done;P(K.dl,deadlines);renderDL();updateDLBadge();}
function dlUrg(ds,done){if(done)return{cls:'dn',label:'',when:'Completed'};const today=new Date();today.setHours(0,0,0,0);const due=pd(ds),diff=Math.round((due-today)/(864e5));if(diff<0)return{cls:'ov',label:'Overdue',when:`${Math.abs(diff)}d overdue`};if(diff===0)return{cls:'ds',label:'Due today',when:'Due today'};if(diff<=3)return{cls:'ds',label:`${diff}d left`,when:`Due in ${diff}d`};return{cls:'ok',label:'',when:`Due ${pd(ds).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}`};}
function renderDL(){const act=deadlines.filter(d=>!d.done),dn=deadlines.filter(d=>d.done);document.getElementById('dlstat').textContent=`${act.length} active · ${dn.length} done`;const el=document.getElementById('dllist');if(!deadlines.length){el.innerHTML='<div class="lempty">No deadlines yet.</div>';return;}el.innerHTML=[...act,...dn].map(d=>{const u=dlUrg(d.date,d.done);return`<div class="dlitem ${d.done?'dn':u.cls}"><div class="dlchk ${d.done?'ok':''}" onclick="togDL('${d.id}')"></div><div class="dlbody"><div class="dltitle ${d.done?'dn':''}">${esc(d.title)}</div>${d.note?`<div style="font-size:calc(var(--fs)*.8);color:var(--muted);margin-top:2px">${esc(d.note)}</div>`:''}<div class="dlwhen ${d.done?'ok':u.cls}">${u.when}</div>${u.label&&!d.done?`<span class="dlbadge ${u.cls}">${u.label}</span>`:''}</div><button class="xbtn" onclick="askDel('dl','${d.id}','${esc(d.title)}')"><svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5l.5-9"/></svg></button></div>`;}).join('');}
function updateDLBadge(){const n=deadlines.filter(d=>{if(d.done)return false;const u=dlUrg(d.date,false);return u.cls==='ov'||u.cls==='ds';}).length;const b=document.getElementById('dlbadge');if(b){b.style.display=n?'':'none';b.textContent=n>9?'9+':n;}}

function addPerson(){const name=document.getElementById('ppname').value.trim();if(!name)return;const rel=document.getElementById('pprel').value.trim(),freq=parseInt(document.getElementById('ppfreq').value),emoji=document.getElementById('ppemoji').value.trim()||'👤',note=document.getElementById('ppnote').value.trim();people.push({id:Date.now().toString(),name,rel,freq,emoji,note,lastContact:TODAY});P(K.people,people);document.getElementById('ppname').value='';document.getElementById('pprel').value='';document.getElementById('ppemoji').value='';document.getElementById('ppnote').value='';renderPeople();}
function logContact(id){const p=people.find(x=>x.id===id);if(p)p.lastContact=TODAY;P(K.people,people);renderPeople();updatePPBadge();showToast('Contact logged ✓');}
function ppUrg(p){const today=new Date();today.setHours(0,0,0,0);const last=pd(p.lastContact),daysSince=Math.round((today-last)/(864e5)),daysLeft=p.freq-daysSince;if(daysLeft<0)return{cls:'ov',txt:`${Math.abs(daysLeft)}d overdue`};if(daysLeft<=Math.floor(p.freq*.2))return{cls:'warn',txt:`${daysLeft}d to go`};return{cls:'ok',txt:`${daysLeft}d to go`};}
function renderPeople(){const el=document.getElementById('pplist');if(!people.length){el.innerHTML='<div class="lempty">Add someone above to start tracking.</div>';return;}const sorted=[...people].sort((a,b)=>{const o={ov:0,warn:1,ok:2};return o[ppUrg(a).cls]-o[ppUrg(b).cls];});const ov=people.filter(p=>ppUrg(p).cls==='ov').length;document.getElementById('ppstat').textContent=`${people.length} people · ${ov} overdue`;el.innerHTML=sorted.map(p=>{const u=ppUrg(p),last=pd(p.lastContact).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});const fl2={7:'Weekly',14:'Fortnightly',30:'Monthly',90:'Quarterly'}[p.freq]||`Every ${p.freq}d`;return`<div class="ppl-item ${u.cls==='ov'?'ov':u.cls==='warn'?'warn':''}"><div class="ppl-av">${p.emoji||'👤'}</div><div class="ppl-body"><div class="ppl-name">${esc(p.name)}</div><div class="ppl-rel">${p.rel?esc(p.rel)+' · ':''} ${fl2}</div><div class="ppl-cd ${u.cls}">${u.txt}</div><div class="ppl-last">Last: ${last}</div>${p.note?`<div style="font-size:calc(var(--fs)*.78);color:var(--muted);margin-top:2px">${esc(p.note)}</div>`:''}</div><div class="ppl-acts"><button class="ppl-cb" onclick="logContact('${p.id}')">✓ Spoke</button><button class="xbtn" onclick="askDel('person','${p.id}','${esc(p.name)}')"><svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5l.5-9"/></svg></button></div></div>`;}).join('');}
function updatePPBadge(){const n=people.filter(p=>ppUrg(p).cls==='ov').length;const b=document.getElementById('ppbadge');if(b){b.style.display=n?'':'none';b.textContent=n>9?'9+':n;}}

function addSC(){
  const ref=document.getElementById('scref').value.trim(),text=document.getElementById('sctext').value.trim(),group=document.getElementById('scgroup').value.trim();
  if(!ref||!text)return;
  scripture.push({id:Date.now().toString(),ref,text,group:group||'',memorised:false,pinned:false});
  P(K.sc,scripture);
  document.getElementById('scref').value='';document.getElementById('sctext').value='';document.getElementById('scgroup').value='';
  renderSC();
}
function togScMem(id){const s=scripture.find(x=>x.id===id);if(s)s.memorised=!s.memorised;P(K.sc,scripture);renderSC();}
function togScPin(id){const s=scripture.find(x=>x.id===id);if(s){s.pinned=!s.pinned;if(s.pinned)scripture.forEach(x=>{if(x.id!==id)x.pinned=false;});}P(K.sc,scripture);renderSC();showToast(s&&s.pinned?'📌 Pinned':'Unpinned');}
function flipCard(id){const el=document.getElementById(`sc-${id}`);if(el)el.classList.toggle('flipped');}
function renderSC(){
  const tot=scripture.length,mem=scripture.filter(s=>s.memorised).length;
  document.getElementById('scstat').textContent=tot?`${mem}/${tot} memorised`:'';
  // Groups
  const groups=[...new Set(scripture.map(s=>s.group).filter(Boolean))].sort();
  const dl=document.getElementById('scGroupList');
  if(dl)dl.innerHTML=groups.map(g=>`<option value="${esc(g)}">`).join('');
  const sel=document.getElementById('scGroupFilter');
  const curGroup=sel?sel.value:'';
  if(sel){const opts=['<option value="">All groups</option>',...groups.map(g=>`<option value="${esc(g)}" ${g===curGroup?'selected':''}>${esc(g)}</option>`)];sel.innerHTML=opts.join('');}
  const filtered=curGroup?scripture.filter(s=>s.group===curGroup):scripture;
  // Pinned first
  const sorted=[...filtered.filter(s=>s.pinned),...filtered.filter(s=>!s.pinned)];
  const el=document.getElementById('scgrid');
  if(!sorted.length){el.innerHTML='<div class="lempty">Add a verse above to start memorising.</div>';return;}
  el.innerHTML=sorted.map(s=>`
    <div class="sc-card ${s.memorised?'mem':''} ${s.pinned?'pinned':''}" id="sc-${s.id}" onclick="flipCard('${s.id}')">
      <div class="sc-front">
        ${s.pinned?'<div style="font-size:.6rem;margin-bottom:4px">📌 Currently memorising</div>':''}
        <div class="sc-ref">${esc(s.ref)}</div>
        ${s.group?`<div class="sc-group-tag">${esc(s.group)}</div>`:''}
        <div class="sc-hint">Tap to reveal</div>
      </div>
      <div class="sc-back">"${esc(s.text)}"<div class="sc-ref" style="margin-top:8px">${esc(s.ref)}</div></div>
      <div class="sc-foot" onclick="event.stopPropagation()">
        <button class="sc-mb" onclick="togScMem('${s.id}')">${s.memorised?'✓ Memorised':'Mark memorised'}</button>
        <button class="sc-pin-btn" onclick="togScPin('${s.id}')">${s.pinned?'📌':'Pin'}</button>
        <div class="sc-spacer"></div>
        <button class="xbtn" onclick="askDel('scripture','${s.id}','${esc(s.ref)}')"><svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5l.5-9"/></svg></button>
      </div>
    </div>`).join('');
}

    </div>

function exportAll(){const payload={notes,grat,mood,special:window._special,master:masterText,prayers,habits,hlog,deadlines,people,scripture,psalm:psalmData};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`daily-notes-backup-${TODAY}.json`;a.click();showToast('Backed up ✓');}
function trigImp(){document.getElementById('impFile').value='';document.getElementById('impFile').click();}
function impAll(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(imp.notes&&typeof imp.notes==='object'){notes={...notes,...imp.notes};if(imp.grat)Object.assign(grat,imp.grat);if(imp.mood)Object.assign(mood,imp.mood);if(imp.special)Object.assign(window._special,imp.special);if(imp.master)masterText=imp.master;if(imp.psalm)psalmData=imp.psalm;if(Array.isArray(imp.prayers)){const ids=new Set(prayers.map(p=>p.id));imp.prayers.forEach(p=>{if(!ids.has(p.id))prayers.push(p);});}if(Array.isArray(imp.habits))imp.habits.forEach(h=>{if(!habits.find(x=>x.id===h.id))habits.push(h);});if(imp.hlog)Object.assign(hlog,imp.hlog);if(Array.isArray(imp.deadlines))imp.deadlines.forEach(d=>{if(!deadlines.find(x=>x.id===d.id))deadlines.push(d);});if(Array.isArray(imp.people))imp.people.forEach(p=>{if(!people.find(x=>x.id===p.id))people.push(p);});if(Array.isArray(imp.scripture))imp.scripture.forEach(s=>{if(!scripture.find(x=>x.id===s.id))scripture.push(s);});}else{const keys=Object.keys(imp);if(keys.every(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)))notes={...notes,...imp};else throw 0;}saveAll();renderCal();if(curDate)renderDay();renderPsalmDisplay();showToast('Restored ✓');}catch{showToast('Could not read that file');}};reader.readAsText(file);}

// TOAST & KEYBOARD
// ════════════════════════════════════════════
let toastT=null;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(qcOpen)closeQC();if(searchOpen)closeSearch();if(sanctuaryOpen)closeSanctuary();}});

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
load();
window._special=window._special||{};
renderCal();
renderDL();updateDLBadge();
updatePPBadge();
const dlDI=document.getElementById('dldat');
if(dlDI){const t=new Date();t.setDate(t.getDate()+7);dlDI.value=fd(t);}
initCopticCalendar();
renderPsalmDisplay();
openDay(TODAY);
</script>
