<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Notes">
<title>Daily Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1a1814;--paper:#211f1b;--card:#272420;
  --ink:#e8e0d4;--muted:#8a8278;--faint:#3e3a34;
  --accent:#c49a6c;--al:#2e2820;
  --today:#e0956a;--has:#b8855a;
  --green:#6a9e7a;--gl:#1e2b22;
  --red:#c0614a;--yellow:#c4aa6c;
  --special:#f0c060;--blue:#6a8fa0;
  --shadow:rgba(0,0,0,0.5);
  --sw:272px;--fs:1rem;
  --nav-h:49px;
  --topbar-h:46px;
}
:root.light{
  --bg:#f5f0e8;--paper:#faf7f2;--card:#f0ebe0;
  --ink:#2c2416;--muted:#7a6e5f;--faint:#c5bfb4;
  --accent:#8b6f47;--al:#e8ddd0;
  --today:#c4714a;--has:#a0845c;
  --green:#4a7e5a;--gl:#d8ede0;
  --red:#a8503b;--yellow:#a08040;
  --shadow:rgba(44,36,22,0.12);
}

/* Fill the notch/status bar area with the paper colour so it blends */
html{
  height:100%;
  background:var(--paper);
}
body{
  height:100%;background:var(--bg);color:var(--ink);
  font-family:'Lora',Georgia,serif;overflow:hidden;
  font-size:var(--fs);-webkit-text-size-adjust:100%;
}

/* ══ ROOT: fill entire screen including notch + home bar ══ */
.app{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top,0px);
  padding-bottom:env(safe-area-inset-bottom,0px);
  padding-left:env(safe-area-inset-left,0px);
  padding-right:env(safe-area-inset-right,0px);
  background:var(--bg);
  overflow:hidden;
  height:100dvh;
}

/* Bleed topbar colour behind the status bar / notch */
.topbar{box-shadow:0 -200px 0 200px var(--paper);}

/* ══ TOP BAR ══ */
.topbar{
  flex-shrink:0;height:var(--topbar-h);
  display:flex;align-items:center;
  background:var(--paper);border-bottom:1px solid var(--faint);
  padding:0 12px;gap:8px;
}
.tb-title{
  flex:1;text-align:center;
  font-family:'DM Mono',monospace;font-size:.62rem;
  color:var(--muted);letter-spacing:.06em;text-transform:uppercase;
}
.ib{
  width:34px;height:34px;
  border:1.5px solid var(--faint);background:transparent;
  border-radius:7px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all .15s;flex-shrink:0;
  -webkit-appearance:none;touch-action:manipulation;
}
.ib:active,.ib.on{border-color:var(--accent);color:var(--accent);background:var(--al)}
.si{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--faint);white-space:nowrap}
.si.sv{color:var(--accent)}

/* ══ MIDDLE: sidebar + content side by side ══ */
.mid{flex:1;display:flex;overflow:hidden;min-height:0;position:relative}

/* ══ LEFT SIDEBAR (calendar) — slides in from left ══ */
.left-panel{
  position:absolute;top:0;left:0;bottom:0;
  width:var(--sw);
  background:var(--paper);border-right:1px solid var(--faint);
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(-100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:20;
  box-shadow:4px 0 20px var(--shadow);
}
.left-panel.open{transform:translateX(0)}

/* ══ RIGHT PANEL (sanctuary) — slides in from right ══ */
.right-panel{
  position:absolute;top:0;right:0;bottom:0;
  width:min(var(--sw), 92vw);
  background:var(--paper);border-left:1px solid var(--faint);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:20;
  box-shadow:-4px 0 20px var(--shadow);
  padding:20px 18px 40px;
}
.right-panel.open{transform:translateX(0)}
.right-panel::-webkit-scrollbar{display:none}

/* Overlay for both panels */
.panel-overlay{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,0,.5);z-index:19;
}
.panel-overlay.show{display:block}

/* ══ MAIN CONTENT ══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;min-width:0}

/* ══ PAGES ══ */
.page{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.page.hide{display:none}
.sa{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sa::-webkit-scrollbar{display:none}

/* Pull to refresh */
.ptr{
  text-align:center;height:0;overflow:hidden;
  font-family:'DM Mono',monospace;font-size:.58rem;
  color:var(--muted);display:flex;align-items:center;
  justify-content:center;transition:height .2s;
  flex-shrink:0;
}
.ptr.show{height:36px}

/* ══ SEARCH ══ */
.sbar{display:flex;align-items:center;gap:7px;padding:7px 12px;border-bottom:1px solid var(--faint);background:var(--paper);flex-shrink:0}
.sinp{flex:1;background:var(--bg);border:1.5px solid var(--faint);border-radius:6px;padding:8px 11px;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--ink);outline:none;-webkit-appearance:none}
.sinp:focus{border-color:var(--accent)}
.sinp::placeholder{color:var(--faint)}
.scls{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);cursor:pointer;padding:6px 10px;border:1.5px solid var(--faint);border-radius:5px;background:transparent;-webkit-appearance:none;min-height:34px}

/* ══ FORMAT BAR (sticks inside notes page above keyboard) ══ */
.fbar-wrap{
  flex-shrink:0;background:var(--bg);
  border-top:1px solid var(--faint);
}
.fbar{
  display:flex;align-items:center;gap:1px;
  padding:5px 12px;overflow-x:auto;scrollbar-width:none;
}
.fbar::-webkit-scrollbar{display:none}
.fb{
  min-width:32px;height:30px;border:none;background:transparent;
  border-radius:5px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-family:'DM Mono',monospace;font-size:.64rem;
  flex-shrink:0;-webkit-appearance:none;padding:0 5px;
  touch-action:manipulation;
}
.fb:active{background:var(--al);color:var(--accent)}
.fx{width:1px;height:13px;background:var(--faint);margin:0 3px;flex-shrink:0}
.fsp{flex:1;min-width:6px}
.wc{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--faint);padding:0 4px;white-space:nowrap;flex-shrink:0}
.todbtn{font-family:'DM Mono',monospace;font-size:.52rem;padding:5px 9px;border:1.5px solid var(--today);background:transparent;border-radius:5px;color:var(--today);cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none}
.todbtn:active{background:rgba(224,149,106,.12)}

/* ══ BOTTOM NAV ══ */
.bottom-nav{
  flex-shrink:0;
  /* Height = tab height + home bar inset */
  height:calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
  padding-bottom:env(safe-area-inset-bottom, 0px);
  background:var(--paper);border-top:1px solid var(--faint);
  display:flex;align-items:flex-start;
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.bottom-nav::-webkit-scrollbar{display:none}
.nav-tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:60px;flex:1;gap:2px;
  border:none;background:transparent;cursor:pointer;
  color:var(--muted);transition:color .15s;
  padding:6px 4px 4px;flex-shrink:0;
  -webkit-appearance:none;touch-action:manipulation;
  position:relative;
}
.nav-tab.on{color:var(--accent)}
.nav-emoji{font-size:1.15rem;line-height:1}
.nav-label{font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.nav-badge{
  position:absolute;top:4px;right:calc(50% - 22px);
  background:var(--red);color:white;
  border-radius:7px;padding:1px 4px;
  font-size:.4rem;font-family:'DM Mono',monospace;
  pointer-events:none;
}

/* ══ CALENDAR PANEL ══ */
.cal-head{padding:10px 10px 6px;border-bottom:1px solid var(--faint);flex-shrink:0;display:flex;align-items:center;gap:8px}
.cal-head h2{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--ink);flex:1;letter-spacing:.04em}
.cal-streak{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--accent)}
.vtog{display:flex;background:var(--bg);border-radius:5px;padding:2px;gap:2px}
.vb{padding:4px 8px;border:none;background:transparent;font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted);cursor:pointer;border-radius:3px;letter-spacing:.05em;text-transform:uppercase;-webkit-appearance:none}
.vb.on{background:var(--paper);color:var(--accent);box-shadow:0 1px 3px var(--shadow)}
.cal-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;scrollbar-width:none}
.cal-area::-webkit-scrollbar{display:none}
.cal-footer{flex-shrink:0;border-top:1px solid var(--faint);padding:6px 8px;display:flex;flex-direction:column;gap:5px}
.cal-btn-row{display:flex;gap:4px}
.cbtn{flex:1;padding:6px 0;border:1.5px solid var(--faint);background:transparent;border-radius:5px;font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;-webkit-appearance:none;min-height:32px}
.cbtn:active{border-color:var(--accent);color:var(--accent);background:var(--al)}
.set-row{display:flex;gap:4px}

/* Calendar dots */
.mb{margin-bottom:12px}
.ml{font-family:'DM Mono',monospace;font-size:.54rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px;padding:0 2px}
.wr{display:flex;gap:2px;margin-bottom:3px}
.wl{font-family:'DM Mono',monospace;font-size:.46rem;color:var(--faint);width:18px;padding-top:4px;flex-shrink:0;text-align:right}
.wd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:1}
.dd{aspect-ratio:1;border-radius:50%;border:1.5px solid var(--faint);background:transparent;cursor:pointer;font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .12s;position:relative;-webkit-appearance:none;min-width:0;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.dd:active{border-color:var(--accent);color:var(--accent)}
.dd.tod{border-color:var(--today);color:var(--today);font-weight:500}
.dd.sel{background:var(--accent);border-color:var(--accent);color:#1a1814}
.dd.hn{background:var(--al);border-color:var(--has);color:var(--has)}
.dd.hn.sel,.dd.tod.sel{background:var(--accent);border-color:var(--accent);color:#1a1814}
.dd.hn::after{content:'';position:absolute;bottom:1px;right:1px;width:3px;height:3px;border-radius:50%;background:var(--has)}
.dd.hn.sel::after{background:rgba(26,24,20,.5)}
.dd.sp{box-shadow:0 0 0 2px var(--special),0 0 8px 2px rgba(240,192,96,.3)!important;border-color:var(--special)!important;color:var(--special)!important}
.dd.sp.sel{background:var(--special);color:#1a1814}
.dd.m1{border-color:#c0614a!important;background:rgba(192,97,74,.13)!important}
.dd.m2{border-color:#c49a6c!important;background:rgba(196,154,108,.11)!important}
.dd.m3{border-color:#c4aa6c!important;background:rgba(196,170,108,.11)!important}
.dd.m4{border-color:#6a9e7a!important;background:rgba(106,158,122,.11)!important}
.dd.m5{border-color:#6a8fa0!important;background:rgba(106,143,160,.11)!important}
.dd.emp{opacity:0;pointer-events:none}
.dd:disabled{opacity:.18;pointer-events:none}
.dh{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;margin-left:20px}
.dhh{font-family:'DM Mono',monospace;font-size:.44rem;text-align:center;color:var(--faint);text-transform:uppercase}

/* ══ SANCTUARY (right panel) ══ */
.sanct-title{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sanct-close{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);padding:4px 9px;border:1.5px solid var(--faint);border-radius:5px;background:transparent;cursor:pointer;-webkit-appearance:none}
.sanct-close:active{color:var(--accent);border-color:var(--accent)}
.coptic-block{background:var(--card);border:1px solid var(--faint);border-left:3px solid var(--accent);border-radius:9px;padding:14px 16px;margin-bottom:20px}
.coptic-lbl{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.coptic-date{font-size:calc(var(--fs)*1.1);font-weight:500;margin-bottom:3px}
.coptic-season{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);margin-bottom:10px}
.coptic-feast-lbl{font-family:'DM Mono',monospace;font-size:.48rem;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.coptic-feast{font-size:calc(var(--fs)*.88);color:var(--ink);line-height:1.6}
.psalm-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.psalm-lbl{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--accent);letter-spacing:.06em;text-transform:uppercase}
.psalm-edit{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);padding:4px 9px;border:1.5px solid var(--faint);border-radius:5px;background:transparent;cursor:pointer;-webkit-appearance:none}
.psalm-edit:active{color:var(--accent);border-color:var(--accent)}
.psalm-text{font-style:italic;font-size:calc(var(--fs)*.98);line-height:2;color:var(--ink);white-space:pre-wrap}
.psalm-ref{font-family:'DM Mono',monospace;font-size:.54rem;color:var(--accent);margin-top:10px}
.psalm-empty{color:var(--faint);font-style:italic;font-size:.9rem;text-align:center;padding:24px 0}
.psalm-form{display:none;flex-direction:column;gap:8px}
.psalm-form.show{display:flex}
.pta{width:100%;background:var(--bg);border:1.5px solid var(--faint);border-radius:7px;padding:11px;font-family:'Lora',Georgia,serif;font-size:.92rem;color:var(--ink);outline:none;resize:none;min-height:130px;caret-color:var(--accent);line-height:1.8;-webkit-appearance:none}
.pta:focus{border-color:var(--accent)}
.pta::placeholder{color:var(--faint);font-style:italic}
.pref{width:100%;background:var(--bg);border:1.5px solid var(--faint);border-radius:6px;padding:9px 11px;font-family:'DM Mono',monospace;font-size:.68rem;color:var(--ink);outline:none;-webkit-appearance:none}
.pref:focus{border-color:var(--accent)}
.pref::placeholder{color:var(--faint)}
.psav{padding:8px 18px;background:var(--accent);border:none;border-radius:6px;font-family:'DM Mono',monospace;font-size:.6rem;color:#1a1814;cursor:pointer;align-self:flex-end;-webkit-appearance:none}
.psav:active{background:var(--today)}

/* ══ NOTES DAY VIEW ══ */
.dv{max-width:660px;margin:0 auto;padding:18px 18px 80px;width:100%}
.dnav{display:flex;align-items:center;gap:7px;margin-bottom:14px}
.backbtn{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted);cursor:pointer;padding:7px 11px;border:1.5px solid var(--faint);border-radius:6px;background:transparent;-webkit-appearance:none;min-height:36px;white-space:nowrap}
.backbtn:active{border-color:var(--accent);color:var(--accent);background:var(--al)}
.arrbtn{width:34px;height:34px;border:1.5px solid var(--faint);background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;-webkit-appearance:none}
.arrbtn:active{border-color:var(--accent);color:var(--accent)}
.arrbtn:disabled{opacity:.2;pointer-events:none}
.dtitle{font-size:calc(var(--fs)*1.28);font-weight:500;color:var(--ink);margin-bottom:2px}
.dtitle.tod{color:var(--today)}
.dsub{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);margin-bottom:12px}
.verse-b{background:var(--card);border:1px solid var(--faint);border-left:3px solid var(--accent);border-radius:7px;padding:10px 13px;margin-bottom:13px}
.vt{font-style:italic;font-size:calc(var(--fs)*.88);color:var(--muted);line-height:1.7;margin-bottom:2px}
.vr{font-family:'DM Mono',monospace;font-size:.54rem;color:var(--accent)}
.moodrow{display:flex;align-items:center;gap:6px;margin-bottom:13px}
.moodlbl{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.moodbtn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--faint);background:transparent;cursor:pointer;font-size:.88rem;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;touch-action:manipulation}
.moodbtn.sel{border-width:2px;transform:scale(1.1)}
.moodbtn[data-m="1"].sel{border-color:#c0614a;background:rgba(192,97,74,.18)}
.moodbtn[data-m="2"].sel{border-color:#c49a6c;background:rgba(196,154,108,.18)}
.moodbtn[data-m="3"].sel{border-color:#c4aa6c;background:rgba(196,170,108,.18)}
.moodbtn[data-m="4"].sel{border-color:#6a9e7a;background:rgba(106,158,122,.18)}
.moodbtn[data-m="5"].sel{border-color:#6a8fa0;background:rgba(106,143,160,.18)}
.pzone{margin-bottom:13px}
.pdrop{border:1.5px dashed var(--faint);border-radius:7px;padding:13px;text-align:center;cursor:pointer;color:var(--faint);font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.04em;min-height:50px;display:flex;align-items:center;justify-content:center;gap:6px}
.pdrop:active,.pdrop.over{border-color:var(--accent);color:var(--accent);background:var(--al)}
.pprev{position:relative;display:inline-block;max-width:100%}
.pprev img{max-width:100%;max-height:230px;border-radius:7px;display:block;object-fit:cover}
.prm{position:absolute;top:6px;right:6px;width:26px;height:26px;background:rgba(26,24,20,.85);border:1px solid var(--faint);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.prm:active{background:var(--red);border-color:var(--red);color:white}
.slbl{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.nta{width:100%;background:transparent;border:none;outline:none;font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*1.0);line-height:1.85;color:var(--ink);resize:none;caret-color:var(--accent);min-height:120px;display:block}
.nta::placeholder{color:var(--faint);font-style:italic}
.ndiv{border:none;border-top:1px solid var(--faint);margin:14px 0}
.grat-inputs{display:flex;flex-direction:column;gap:8px}
.grow{display:flex;align-items:center;gap:6px}
.gnum{font-family:'DM Mono',monospace;font-size:.53rem;color:var(--faint);width:12px;flex-shrink:0}
.ginp{flex:1;background:transparent;border:none;border-bottom:1px solid var(--faint);outline:none;font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*.88);color:var(--ink);padding:6px 2px;caret-color:var(--accent);-webkit-appearance:none;border-radius:0}
.ginp:focus{border-bottom-color:var(--accent)}
.ginp::placeholder{color:var(--faint);font-style:italic}

/* Rich text preview */
.rtv{font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*1.0);line-height:1.85;color:var(--ink)}
.rtv h1{font-size:calc(var(--fs)*1.5);font-weight:500;margin:.1em 0 .4em;line-height:1.2}
.rtv h2{font-size:calc(var(--fs)*1.2);font-weight:500;margin:.8em 0 .35em}
.rtv h3{font-size:calc(var(--fs)*1.0);font-weight:600;margin:.7em 0 .28em}
.rtv p{margin:0 0 .75em}
.rtv strong{font-weight:700}
.rtv em{font-style:italic;color:var(--muted)}
.rtv ul,.rtv ol{margin:.25em 0 .75em 1.3em}
.rtv li{margin-bottom:.18em}
.rtv blockquote{border-left:3px solid var(--accent);margin:.6em 0;padding:.15em 0 .15em .9em;color:var(--muted);font-style:italic}
.rtv code{font-family:'DM Mono',monospace;font-size:.82em;background:var(--al);padding:.08em .28em;border-radius:3px;color:var(--accent)}
.rtv hr{border:none;border-top:1px solid var(--faint);margin:.9em 0}
.rtv a{color:var(--accent)}

/* Search */
.srw{padding:14px 16px;max-width:660px;margin:0 auto;width:100%}
.sri{padding:11px 13px;border-radius:6px;cursor:pointer;margin-bottom:5px;border:1px solid var(--faint)}
.sri:active{background:var(--paper)}
.srd{font-family:'DM Mono',monospace;font-size:.54rem;color:var(--accent);margin-bottom:3px}
.srp{font-size:.84rem;color:var(--muted);line-height:1.5}
.srp mark{background:rgba(196,154,108,.2);color:var(--accent);border-radius:2px;padding:0 2px}

/* Last year / anniversary */
.lylast,.lyann{border-radius:7px;padding:10px 13px;margin-bottom:13px;cursor:pointer}
.lylast{background:var(--card);border:1px solid var(--faint);border-left:3px solid var(--muted)}
.lyann{background:rgba(240,192,96,.07);border:1px solid var(--special);border-left:3px solid var(--special)}
.ly-lbl{font-family:'DM Mono',monospace;font-size:.49rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.lyann .ly-lbl{color:var(--special)}
.ly-body{font-size:calc(var(--fs)*.86);color:var(--muted);font-style:italic;line-height:1.6}

/* ══ MASTER ══ */
.master-area{max-width:660px;margin:0 auto;padding:18px 18px 80px;width:100%;display:flex;flex-direction:column;min-height:100%}
.master-ta{width:100%;background:transparent;border:none;outline:none;font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*1.0);line-height:1.9;color:var(--ink);resize:none;caret-color:var(--accent);min-height:60vh;flex:1}
.master-ta::placeholder{color:var(--faint);font-style:italic}
.master-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:11px;border-bottom:1px solid var(--faint)}
.mhd-title{font-size:calc(var(--fs)*1.05);font-weight:500}
.mhd-wc{font-family:'DM Mono',monospace;font-size:.54rem;color:var(--muted)}

/* ══ GENERIC PANEL ══ */
.gw{max-width:620px;margin:0 auto;padding:18px 18px 80px;width:100%}
.stitle{font-size:calc(var(--fs)*1.0);font-weight:500;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.stitle-sub{font-family:'DM Mono',monospace;font-size:.54rem;color:var(--muted);font-weight:400}
.af{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:12px;margin-bottom:14px}
.frow{display:flex;gap:5px;margin-bottom:5px}
.fi{flex:1;background:var(--bg);border:1.5px solid var(--faint);border-radius:6px;padding:8px 10px;font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*.88);color:var(--ink);outline:none;-webkit-appearance:none;min-height:36px}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--faint);font-style:italic}
.fta{width:100%;resize:none;min-height:48px;line-height:1.5}
.abtn{padding:8px 15px;background:var(--accent);border:none;border-radius:6px;font-family:'DM Mono',monospace;font-size:.58rem;color:#1a1814;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;align-self:flex-end;-webkit-appearance:none;min-height:36px}
.abtn:active{background:var(--today)}
.filrow{display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap}
.pf{padding:5px 10px;border:1.5px solid var(--faint);background:transparent;border-radius:14px;font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);cursor:pointer;-webkit-appearance:none;min-height:28px}
.pf.on{background:var(--accent);border-color:var(--accent);color:#1a1814}
.pitem{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:11px 12px;margin-bottom:5px;display:flex;gap:8px;align-items:flex-start}
.pitem.done{opacity:.5;border-style:dashed}
.pchk{width:20px;height:20px;border:1.5px solid var(--faint);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;min-width:20px}
.pchk.ok{background:var(--green);border-color:var(--green)}
.pchk.ok::after{content:'✓';font-size:.5rem;color:white;font-family:'DM Mono',monospace}
.pbody{flex:1;min-width:0}
.pname{font-weight:500;font-size:calc(var(--fs)*.88);margin-bottom:2px}
.pname.done{text-decoration:line-through;color:var(--muted)}
.preq{font-size:calc(var(--fs)*.8);color:var(--muted);line-height:1.5}
.pmeta{font-family:'DM Mono',monospace;font-size:.48rem;color:var(--faint);margin-top:3px}
.pbadge{font-family:'DM Mono',monospace;font-size:.46rem;color:var(--green);background:var(--gl);padding:2px 5px;border-radius:7px;margin-top:2px;display:inline-block}
.xbtn{width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center;border-radius:3px;-webkit-appearance:none;padding:0;flex-shrink:0}
.xbtn:active{color:var(--red)}
.hcfg{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:12px;margin-bottom:16px}
.hcfg-t{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.hadd{display:flex;gap:5px}
.hei{width:38px;background:var(--bg);border:1.5px solid var(--faint);border-radius:5px;padding:7px 2px;font-size:1rem;text-align:center;outline:none;color:var(--ink);-webkit-appearance:none;min-height:36px}
.hei:focus{border-color:var(--accent)}
.hni{flex:1;background:var(--bg);border:1.5px solid var(--faint);border-radius:5px;padding:7px 9px;font-family:'Lora',Georgia,serif;font-size:calc(var(--fs)*.86);color:var(--ink);outline:none;-webkit-appearance:none;min-height:36px}
.hni:focus{border-color:var(--accent)}
.hni::placeholder{color:var(--faint);font-style:italic}
.hwhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.hwt{font-family:'DM Mono',monospace;font-size:.54rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.hwnav{display:flex;gap:3px}
.hwnb{width:26px;height:26px;border:1.5px solid var(--faint);background:transparent;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);-webkit-appearance:none}
.hwnb:active{border-color:var(--accent);color:var(--accent)}
.hgrid{display:flex;flex-direction:column;gap:6px}
.hrow{display:flex;align-items:center;gap:5px}
.hrlbl{display:flex;align-items:center;gap:4px;width:140px;flex-shrink:0}
.hemoji{font-size:.88rem;width:20px;text-align:center}
.hrname{font-size:.82rem;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.hdelbtn{width:16px;height:16px;border:none;background:transparent;cursor:pointer;color:var(--faint);display:flex;align-items:center;justify-content:center;-webkit-appearance:none;padding:0;flex-shrink:0}
.hdelbtn:active{color:var(--red)}
.hdays{display:flex;gap:3px;flex:1}
.hcell{flex:1;aspect-ratio:1;border-radius:4px;border:1.5px solid var(--faint);background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .12s;max-width:34px;touch-action:manipulation}
.hcell.done{background:var(--al);border-color:var(--has)}
.hcell.done-today{background:var(--al);border-color:var(--accent)}
.hcell .hcd{font-family:'DM Mono',monospace;font-size:.42rem;color:var(--faint)}
.hcell .hck{font-size:.62rem;opacity:0}
.hcell.done .hck,.hcell.done-today .hck{opacity:1}
.hcell.fut{opacity:.2;pointer-events:none}
.hstat{font-family:'DM Mono',monospace;font-size:.48rem;color:var(--accent);margin-left:auto;white-space:nowrap}
.dlform{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:12px;margin-bottom:14px}
.dlgrid{display:grid;grid-template-columns:1fr auto;gap:5px;margin-bottom:5px}
.ddi{background:var(--bg);border:1.5px solid var(--faint);border-radius:5px;padding:7px 9px;font-family:'DM Mono',monospace;font-size:.66rem;color:var(--ink);outline:none;color-scheme:dark;-webkit-appearance:none;min-height:36px}
:root.light .ddi{color-scheme:light}
.ddi:focus{border-color:var(--accent)}
.dlitem{background:var(--card);border:1px solid var(--faint);border-radius:7px;padding:10px 12px;margin-bottom:5px;display:flex;align-items:flex-start;gap:8px}
.dlitem.ov{border-color:var(--red);background:rgba(192,97,74,.06)}
.dlitem.ds{border-color:var(--yellow);background:rgba(196,170,108,.06)}
.dlitem.dn{opacity:.45;border-style:dashed}
.dlchk{width:20px;height:20px;border:1.5px solid var(--faint);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;min-width:20px}
.dlchk.ok{background:var(--green);border-color:var(--green)}
.dlchk.ok::after{content:'✓';font-size:.5rem;color:white;font-family:'DM Mono',monospace}
.dlbody{flex:1;min-width:0}
.dltitle{font-size:calc(var(--fs)*.88);font-weight:500;margin-bottom:2px}
.dltitle.dn{text-decoration:line-through;color:var(--muted)}
.dlwhen{font-family:'DM Mono',monospace;font-size:.54rem;margin-top:2px}
.dlwhen.ov{color:var(--red)}.dlwhen.ds{color:var(--yellow)}.dlwhen.ok{color:var(--faint)}
.dlbadge{display:inline-block;font-family:'DM Mono',monospace;font-size:.46rem;padding:2px 5px;border-radius:7px;margin-top:2px}
.dlbadge.ov{background:rgba(192,97,74,.18);color:var(--red)}
.dlbadge.ds{background:rgba(196,170,108,.14);color:var(--yellow)}
.ppl-item{background:var(--card);border:1px solid var(--faint);border-radius:7px;padding:11px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px}
.ppl-item.ov{border-color:var(--red)!important}
.ppl-item.warn{border-color:var(--yellow)!important}
.ppl-av{width:36px;height:36px;border-radius:50%;background:var(--al);border:2px solid var(--faint);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;min-width:36px}
.ppl-item.ov .ppl-av{border-color:var(--red)}
.ppl-item.warn .ppl-av{border-color:var(--yellow)}
.ppl-body{flex:1;min-width:0}
.ppl-name{font-weight:500;font-size:calc(var(--fs)*.9);margin-bottom:2px}
.ppl-rel{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted);margin-bottom:2px}
.ppl-cd{font-family:'DM Mono',monospace;font-size:.53rem;margin-bottom:2px}
.ppl-cd.ok{color:var(--green)}.ppl-cd.warn{color:var(--yellow)}.ppl-cd.ov{color:var(--red)}
.ppl-last{font-family:'DM Mono',monospace;font-size:.47rem;color:var(--faint)}
.ppl-acts{display:flex;gap:4px;align-items:center;flex-shrink:0}
.ppl-cb{padding:5px 9px;background:var(--accent);border:none;border-radius:5px;font-family:'DM Mono',monospace;font-size:.5rem;color:#1a1814;cursor:pointer;white-space:nowrap;-webkit-appearance:none;min-height:30px}
.ppl-cb:active{background:var(--today)}
.freq-sel{background:var(--bg);border:1.5px solid var(--faint);border-radius:5px;padding:7px 7px;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--ink);outline:none;color-scheme:dark;cursor:pointer;-webkit-appearance:none;min-height:36px}
:root.light .freq-sel{color-scheme:light}
.freq-sel:focus{border-color:var(--accent)}
.sc-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.sc-gsel{background:var(--bg);border:1.5px solid var(--faint);border-radius:5px;padding:5px 9px;font-family:'DM Mono',monospace;font-size:.58rem;color:var(--ink);outline:none;color-scheme:dark;cursor:pointer;-webkit-appearance:none}
:root.light .sc-gsel{color-scheme:light}
.sc-hint2{flex:1;font-family:'DM Mono',monospace;font-size:.5rem;color:var(--faint);letter-spacing:.04em}
.sc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px}
.sc-card{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:12px;cursor:pointer;min-height:90px;touch-action:manipulation}
.sc-card:active{border-color:var(--accent)}
.sc-card.mem{border-color:var(--green);opacity:.65}
.sc-card.pinned{border-color:var(--special);box-shadow:0 0 0 1px var(--special),0 0 8px rgba(240,192,96,.18)}
.sc-front{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:68px;text-align:center}
.sc-ref{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--accent);letter-spacing:.04em;margin-bottom:4px}
.sc-gtag{font-family:'DM Mono',monospace;font-size:.48rem;color:var(--faint);margin-bottom:4px}
.sc-hint{font-size:.7rem;color:var(--faint);font-style:italic}
.sc-back{display:none;font-style:italic;font-size:calc(var(--fs)*.86);color:var(--ink);line-height:1.7}
.sc-card.flipped .sc-front{display:none}
.sc-card.flipped .sc-back{display:block}
.sc-foot{display:flex;align-items:center;gap:4px;margin-top:8px;padding-top:6px;border-top:1px solid var(--faint)}
.sc-mb{font-family:'DM Mono',monospace;font-size:.48rem;padding:3px 7px;border:1.5px solid var(--faint);background:transparent;border-radius:10px;cursor:pointer;color:var(--muted);-webkit-appearance:none;min-height:24px}
.sc-mb:active{border-color:var(--green);color:var(--green)}
.sc-card.mem .sc-mb{border-color:var(--green);color:var(--green);background:var(--gl)}
.sc-pb{font-family:'DM Mono',monospace;font-size:.48rem;padding:3px 7px;border:1.5px solid var(--faint);background:transparent;border-radius:10px;cursor:pointer;color:var(--muted);-webkit-appearance:none;min-height:24px}
.sc-card.pinned .sc-pb{border-color:var(--special);color:var(--special)}
.sc-sp{flex:1}
.sc-af{background:var(--card);border:1px solid var(--faint);border-radius:8px;padding:12px;margin-bottom:14px}
.lempty{color:var(--faint);font-style:italic;font-size:calc(var(--fs)*.84);padding:24px 0;text-align:center}


/* Confirm */
.cnfov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center;padding:20px}
.cnfov.show{display:flex}
.cnfbox{background:var(--paper);border-radius:11px;padding:22px 24px;max-width:280px;width:100%;text-align:center;box-shadow:0 20px 60px var(--shadow);border:1px solid var(--faint)}
.cnfbox p{font-size:calc(var(--fs)*.82);color:var(--muted);margin-bottom:14px;line-height:1.5}
.cnfbox strong{color:var(--ink)}
.cnfbtns{display:flex;gap:7px;justify-content:center}
.btn{padding:8px 14px;border-radius:6px;border:1.5px solid;font-family:'DM Mono',monospace;font-size:.6rem;cursor:pointer;-webkit-appearance:none;min-height:36px}
.btnc{border-color:var(--faint);background:transparent;color:var(--muted)}
.btnd{border-color:var(--red);background:var(--red);color:white}
.btnd:active{background:#a8503b}

/* Toast */
.toast{position:fixed;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--bg);font-family:'DM Mono',monospace;font-size:.58rem;padding:7px 15px;border-radius:16px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap;z-index:200;letter-spacing:.03em;max-width:calc(100vw - 40px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.dv,.pitem,.dlitem,.hrow,.ppl-item,.sc-card{animation:fadeUp .15s ease both}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <button class="ib" id="sBtn" onclick="togSearch()" style="display:none">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4"/><path d="M10 10l3.5 3.5"/></svg>
    </button>
    <div class="tb-title" id="tbTitle">Notes</div>
    <button class="ib" id="pvBtn" onclick="togPreview()" style="display:none">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>
    </button>
    <span class="si" id="si" style="display:none">saved</span>
    <button class="ib" id="themeBtn" onclick="togTheme()">☀️</button>
    <button class="ib" onclick="cycleFont()" title="Font size">Aa</button>
  </div>

  <!-- MIDDLE AREA -->
  <div class="mid">

    <!-- LEFT PANEL: Calendar -->
    <div class="panel-overlay" id="leftOv" onclick="closeLeft()"></div>
    <div class="left-panel" id="leftPanel">
      <div class="cal-head">
        <h2 id="calStreak">0🔥</h2>
        <div class="vtog">
          <button class="vb on" id="vbW" onclick="setView('w')">W</button>
          <button class="vb" id="vbM" onclick="setView('m')">M</button>
        </div>
        <button class="ib" onclick="closeLeft()" style="width:28px;height:28px;border-radius:5px">✕</button>
      </div>
      <div class="cal-area" id="calArea"></div>
      <div class="cal-footer">
        <div class="cal-btn-row">
          <button class="cbtn" onclick="closeLeft();setTimeout(showYearlyReview,80)">✦ Year Review</button>
        </div>
        <div class="cal-btn-row">
          <button class="cbtn" id="themeBtn2" onclick="togTheme()">☀️ Light</button>
          <button class="cbtn" onclick="cycleFont()">Aa Font</button>
        </div>
        <div class="cal-btn-row">
          <button class="cbtn" onclick="exportAll()">⬇ Backup</button>
          <button class="cbtn" onclick="trigImp()">⬆ Restore</button>
          <input type="file" id="impFile" accept=".json" style="display:none" onchange="impAll(event)">
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: Sanctuary -->
    <div class="panel-overlay" id="rightOv" onclick="closeRight()"></div>
    <div class="right-panel" id="rightPanel">
      <div class="sanct-title">
        ✦ Sanctuary
        <button class="sanct-close" onclick="closeRight()">Close →</button>
      </div>

      <!-- Coptic Calendar -->
      <div class="coptic-block">
        <div class="coptic-lbl">☩ Coptic Calendar</div>
        <div class="coptic-date" id="copticDate">—</div>
        <div class="coptic-season" id="copticSeason"></div>
        <div class="coptic-feast-lbl">Feast of the Day</div>
        <div class="coptic-feast" id="copticFeast">—</div>
      </div>

      <!-- My Psalm -->
      <div class="psalm-hd">
        <div class="psalm-lbl">✦ My Psalm</div>
        <button class="psalm-edit" onclick="togPsalmEdit()">Edit</button>
      </div>
      <div id="psalmDisplay"><div class="psalm-empty">Tap Edit to add your psalm.</div></div>
      <div class="psalm-form" id="psalmForm">
        <textarea class="pta" id="psalmTA" placeholder="Paste or type your psalm here…"></textarea>
        <input class="pref" id="psalmRef" placeholder="Reference — e.g. Psalm 23 (NKJV)">
        <button class="psav" onclick="savePsalm()">Save</button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

      <!-- Notes page -->
      <div class="page" id="page-notes">
        <div class="sbar" id="sbar" style="display:none">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="var(--muted)" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4"/><path d="M10 10l3.5 3.5"/></svg>
          <input class="sinp" id="sinp" placeholder="Search all entries…" oninput="doSearch(this.value)" autocomplete="off">
          <button class="scls" onclick="closeSearch()">Close</button>
        </div>
        <div class="ptr" id="ptr">↓ Release to refresh</div>
        <div class="sa" id="noteScroll">
          <div class="dv" id="dv"></div>
          <div id="sres" style="display:none"><div class="srw" id="srw"></div></div>
        </div>
        <div class="fbar-wrap" id="fbarWrap">
          <div class="fbar" onmousedown="event.preventDefault()">
            <button class="fb" onmousedown="event.preventDefault()" onclick="fmt('h1')">H1</button>
            <button class="fb" onmousedown="event.preventDefault()" onclick="fmt('h2')">H2</button>
            <button class="fb" onmousedown="event.preventDefault()" onclick="fmt('h3')">H3</button>
            <div class="fx"></div>
            <button class="fb" onmousedown="event.preventDefault()" onclick="fmt('bold')" style="font-weight:700;font-size:.8rem">B</button>
            <button class="fb" onmousedown="event.preventDefault()" onclick="fmt('italic')" style="font-style:italic;font-size:.8rem">I</button>
            <div class="fx"></div>
            <button class="fb" onmousedown="event.preventDefault()" onclick="fmt('ul')" style="font-size:.7rem">• List</button>
            <button class="fb" onmousedown="event.preventDefault()" onclick="fmt('ol')" style="font-size:.7rem">1. List</button>

function gregorianToCoptic(gY,gM,gD){
  // Julian Day Number approach
  const L=Math.floor((14-gM)/12),yy=gY+4800-L,mm=gM+12*L-3;
  const JDN=gD+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;
  // Coptic epoch JDN = 1825030 (29 Aug 284 AD Julian)
  const n=JDN-1825030;
  const cY=Math.floor((4*n+3)/(4*365+1));
  const r=n-Math.floor(cY*(365.25));
  const cM=Math.floor(r/30);
  const cD=r%30+1;
  return{year:cY>0?cY:1,month:Math.min(12,Math.max(0,cM)),day:Math.min(cM===12?6:30,Math.max(1,cD))};
}

function initCopticCalendar(){
  const now=new Date();
  const c=gregorianToCoptic(now.getFullYear(),now.getMonth()+1,now.getDate());
  const mName=CM[c.month]||'Nasie';
  document.getElementById('copticDate').textContent=`${c.day} ${mName} ${c.year} AM`;
  document.getElementById('copticSeason').textContent=CS[mName]||'';
  const key=`${c.month+1}/${c.day}`;
  const feast=CF[key]||'No major feast recorded for this day';
  document.getElementById('copticFeast').textContent=feast;
}

// SWIPE GESTURES
// ════════════════════════════════════════════
(function(){
  const main=document.querySelector('.main');
  let tx=0,ty=0,active=false,edge=false;

  main.addEventListener('touchstart',e=>{
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;active=true;
    // Left edge → will open left; right edge → will open right
    edge=tx<32?'left':tx>window.innerWidth-32?'right':null;
  },{passive:true});

  main.addEventListener('touchmove',e=>{
    if(!active)return;
    const dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)*3&&Math.abs(dx)>52){
      if(dx>0&&edge==='left'){openLeft();active=false;}
      else if(dx<0&&edge==='right'){openRight();active=false;}
      else if(dx<0&&document.getElementById('leftPanel').classList.contains('open')){closeLeft();active=false;}
      else if(dx>0&&document.getElementById('rightPanel').classList.contains('open')){closeRight();active=false;}

  },{passive:true});

// ════════════════════════════════════════════
// PHOTO — IndexedDB storage + canvas compression
// Photos are stored in IndexedDB (no 5MB cap) and
// compressed to max 1200px / 0.75 JPEG quality first
// ════════════════════════════════════════════

// ── IndexedDB setup ──
let photoDB = null;
function openPhotoDB(){
  return new Promise((res,rej)=>{
    if(photoDB){res(photoDB);return;}
    const req=indexedDB.open('DailyNotesPhotos',1);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore('photos',{keyPath:'date'});};
    req.onsuccess=e=>{photoDB=e.target.result;res(photoDB);};
    req.onerror=()=>rej(req.error);
  });
}
async function savePhotoIDB(date,dataUrl){
  const db=await openPhotoDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction('photos','readwrite');
    tx.objectStore('photos').put({date,dataUrl});
    tx.oncomplete=()=>res();
    tx.onerror=()=>rej(tx.error);
  });
}
async function loadPhotoIDB(date){
  const db=await openPhotoDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction('photos','readonly');
    const req=tx.objectStore('photos').get(date);
    req.onsuccess=()=>res(req.result?req.result.dataUrl:null);
    req.onerror=()=>rej(req.error);
  });
}
async function deletePhotoIDB(date){
  const db=await openPhotoDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction('photos','readwrite');
    tx.objectStore('photos').delete(date);
    tx.oncomplete=()=>res();
    tx.onerror=()=>rej(tx.error);
  });
}
async function getAllPhotoKeysIDB(){
  const db=await openPhotoDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction('photos','readonly');
    const req=tx.objectStore('photos').getAllKeys();
    req.onsuccess=()=>res(req.result||[]);
    req.onerror=()=>rej(req.error);
  });
}

// ── Canvas compression ──
function compressImage(file,maxPx=1200,quality=0.78){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxPx||h>maxPx){
          const ratio=Math.min(maxPx/w,maxPx/h);
          w=Math.round(w*ratio);h=Math.round(h*ratio);
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        res(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Photo in-memory cache for current session ──
// We keep a small Map so we don't re-read IDB on every renderDay
const photoCache=new Map();

function trigPhoto(){document.getElementById('phoinp')&&document.getElementById('phoinp').click();}
function pdov(e){e.preventDefault();document.getElementById('pdrop')&&document.getElementById('pdrop').classList.add('over');}
function pdlv(){document.getElementById('pdrop')&&document.getElementById('pdrop').classList.remove('over');}
function pdrp(e){e.preventDefault();pdlv();const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))rdPhoto(f);}
function phoSel(e){const f=e.target.files[0];if(f)rdPhoto(f);}

async function rdPhoto(file){
  showToast('Compressing…');
  try{
    const compressed=await compressImage(file);
    photoCache.set(curDate,compressed);
    await savePhotoIDB(curDate,compressed);
    renderDay();renderCal();
    showToast('Photo saved ✓');
  }catch(err){
    console.error('Photo save failed',err);
    showToast('Could not save photo');
  }
}

async function rmPhoto(){
  photoCache.delete(curDate);
  await deletePhotoIDB(curDate);
  renderDay();renderCal();
}

// Load a photo for a given date (uses cache first)
async function loadPhoto(date){
  if(photoCache.has(date))return photoCache.get(date);
  try{
    const data=await loadPhotoIDB(date);
    if(data)photoCache.set(date,data);
    return data;
  }catch{return null;}
}

// Check if a date has a photo (for calendar dots) — uses cache
async function preloadPhotoKeys(){
  try{
    const keys=await getAllPhotoKeysIDB();
    keys.forEach(k=>{if(!photoCache.has(k))photoCache.set(k,'__exists__');});
  }catch(err){console.warn('IDB preload failed',err);}
}
function hasPhoto(date){return photoCache.has(date)&&photoCache.get(date)!==null;}

// Migrate any existing localStorage photos to IDB on first run
async function migrateOldPhotos(){
  try{
    const old=JSON.parse(localStorage.getItem(K.photos)||'{}');
    const keys=Object.keys(old);
    if(!keys.length)return;
    showToast(`Migrating ${keys.length} photo${keys.length>1?'s':''} to safe storage…`);
    for(const date of keys){
      await savePhotoIDB(date,old[date]);
      photoCache.set(date,old[date]);
    }
    localStorage.removeItem(K.photos);
    showToast('Photos migrated ✓');
  }catch(err){console.warn('Photo migration error',err);}
}

function fmt(type){
  if(isPrev)return;
  const ta=document.getElementById('mta');if(!ta)return;
  ta.focus();
  // Use remembered selection (crucial on mobile)
  const lS=ta.selectionStart,lE=ta.selectionEnd;
  const s=(lS===lE&&_lastSel.end>_lastSel.start)?_lastSel.start:lS;
  const e=(lS===lE&&_lastSel.end>_lastSel.start)?_lastSel.end:lE;
  ta.setSelectionRange(s,e);
  const sel=ta.value.substring(s,e),bef=ta.value.substring(0,s),aft=ta.value.substring(e);
  switch(type){
    case 'bold':ta.value=bef+`**${sel||'bold text'}**`+aft;ta.selectionStart=s+(sel?0:2);ta.selectionEnd=s+(sel?sel.length+4:11);break;
    case 'italic':ta.value=bef+`*${sel||'italic text'}*`+aft;ta.selectionStart=s+(sel?0:1);ta.selectionEnd=s+(sel?sel.length+2:12);break;
    case 'h1':ipfx(ta,'# ');break;case 'h2':ipfx(ta,'## ');break;case 'h3':ipfx(ta,'### ');break;
    case 'ul':ipfx(ta,'- ');break;case 'ol':ipfx(ta,'1. ');break;case 'task':ipfx(ta,'- [ ] ');break;
    case 'quote':ipfx(ta,'> ');break;
    case 'hr':{const nl=bef.endsWith('\n')||!bef?'':'\n';ta.value=bef+nl+'\n---\n\n'+aft;ta.selectionStart=ta.selectionEnd=s+nl.length+6;break;}
  }
  ta.dispatchEvent(new Event('input'));ta.focus();autoR(ta);
  _lastSel={start:ta.selectionStart,end:ta.selectionEnd};
}
function ipfx(ta,pfx){
  const s=ta.selectionStart,bef=ta.value.substring(0,s),aft=ta.value.substring(s);
  const ls=bef.lastIndexOf('\n')+1,lc=bef.substring(ls);
  if(lc.startsWith(pfx)){ta.value=bef.substring(0,ls)+lc.substring(pfx.length)+aft;ta.selectionStart=ta.selectionEnd=s-pfx.length;}
  else{ta.value=bef.substring(0,ls)+pfx+lc+aft;ta.selectionStart=ta.selectionEnd=s+pfx.length;}
}
function onKD(e){
  const ta=e.target;
  if(e.key==='Tab'){e.preventDefault();const s=ta.selectionStart;ta.value=ta.value.substring(0,s)+'  '+ta.value.substring(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+2;ta.dispatchEvent(new Event('input'));return;}
  if(e.key==='Enter'){
    const s=ta.selectionStart,bef=ta.value.substring(0,s),ls=bef.lastIndexOf('\n')+1,line=bef.substring(ls);
    const ul=line.match(/^(\s*)(- \[[ x]\] |- )/),ol=line.match(/^(\s*)(\d+)\. /);
    if(ul){e.preventDefault();if(line===ul[0]){ta.value=ta.value.substring(0,ls)+'\n'+ta.value.substring(s);ta.selectionStart=ta.selectionEnd=ls+1;}else{const ins='\n'+ul[1]+(ul[2].includes('[ ]')||ul[2].includes('[x]')?'- [ ] ':'- ');ta.value=bef+ins+ta.value.substring(s);ta.selectionStart=ta.selectionEnd=s+ins.length;}ta.dispatchEvent(new Event('input'));autoR(ta);}
    else if(ol){e.preventDefault();const ins='\n'+ol[1]+(parseInt(ol[2])+1)+'. ';ta.value=bef+ins+ta.value.substring(s);ta.selectionStart=ta.selectionEnd=s+ins.length;ta.dispatchEvent(new Event('input'));autoR(ta);}
  }
}

// ════════════════════════════════════════════
// MARKDOWN RENDERER — produces actual HTML
// ════════════════════════════════════════════
function renderMD(md){
  if(!md||!md.trim())return'';
  // Process line by line for block-level, then inline
  const lines=md.split('\n');
  let html='',inUL=false,inOL=false;
  const closeList=()=>{if(inUL){html+='</ul>';inUL=false;}if(inOL){html+='</ol>';inOL=false;}};
  const inlineFormat=s=>{
    s=esc(s);
    s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
    s=s.replace(/_(.+?)_/g,'<em>$1</em>');
    s=s.replace(/`(.+?)`/g,'<code>$1</code>');
    return s;
  };
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    // Headings
    if(/^### /.test(line)){closeList();html+=`<h3>${inlineFormat(line.slice(4))}</h3>`;continue;}
    if(/^## /.test(line)){closeList();html+=`<h2>${inlineFormat(line.slice(3))}</h2>`;continue;}
    if(/^# /.test(line)){closeList();html+=`<h1>${inlineFormat(line.slice(2))}</h1>`;continue;}
    // HR
    if(/^---+$/.test(line.trim())){closeList();html+='<hr>';continue;}
    // Blockquote
    if(/^> /.test(line)){closeList();html+=`<blockquote>${inlineFormat(line.slice(2))}</blockquote>`;continue;}
    // Task list
    if(/^- \[x\] /i.test(line)){if(!inUL){html+='<ul>';inUL=true;}html+=`<li style="list-style:none"><input type="checkbox" checked disabled style="margin-right:5px;accent-color:var(--accent)"> <s style="opacity:.55">${inlineFormat(line.slice(6))}</s></li>`;continue;}
    if(/^- \[ \] /i.test(line)){if(!inUL){html+='<ul>';inUL=true;}html+=`<li style="list-style:none"><input type="checkbox" disabled style="margin-right:5px;accent-color:var(--accent)"> ${inlineFormat(line.slice(6))}</li>`;continue;}
    // Unordered list
    if(/^[*-] /.test(line)){if(!inUL){closeList();html+='<ul>';inUL=true;}html+=`<li>${inlineFormat(line.slice(2))}</li>`;continue;}
    // Ordered list
    if(/^\d+\. /.test(line)){if(!inOL){closeList();html+='<ol>';inOL=true;}html+=`<li>${inlineFormat(line.replace(/^\d+\. /,''))}</li>`;continue;}
    // Blank line
    if(!line.trim()){closeList();html+='<br>';continue;}
    // Paragraph
    closeList();
    html+=`<p>${inlineFormat(line)}</p>`;
  }
  closeList();
  return html;
}

  const longest=entries.reduce((a,b)=>wc(b[1])>wc(a[1])?b:a);
  const spDays=Object.keys(_special).filter(ds=>ds.startsWith(year+'')).length;
  const byM={};entries.forEach(([ds,v])=>{const m=ds.substring(0,7);byM[m]=(byM[m]||0)+wc(v);});
  const bm=Object.entries(byM).sort((a,b)=>b[1]-a[1])[0];
  const bmL=bm?pd(bm[0]+'-01').toLocaleDateString('en-AU',{month:'long'}):'—';
  document.getElementById('dv').innerHTML=`
    <div class="dnav"><button class="backbtn" onclick="renderDay()"><svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 1L3 5l4 4"/></svg>Back</button></div>
    <div style="font-family:'DM Mono',monospace;font-size:.54rem;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">${year} in review</div>
    <div style="font-size:calc(var(--fs)*1.2);font-weight:500;margin-bottom:18px">A year of showing up.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px">
      ${[['📅','Days written',daysW],['✍️','Total words',totalW.toLocaleString()],['✨','Special days',spDays],['🔥','Best month',bmL]].map(([e,l,v])=>`<div style="background:var(--card);border:1px solid var(--faint);border-radius:7px;padding:12px"><div style="font-size:1rem;margin-bottom:3px">${e}</div><div style="font-family:'DM Mono',monospace;font-size:.48rem;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em">${l}</div><div style="font-size:calc(var(--fs)*1.0);font-weight:500">${v}</div></div>`).join('')}
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">Most written day</div>
    <div style="background:var(--card);border:1px solid var(--faint);border-left:3px solid var(--accent);border-radius:7px;padding:12px;cursor:pointer;margin-bottom:18px" onclick="openDay('${longest[0]}')">
      <div style="font-family:'DM Mono',monospace;font-size:.54rem;color:var(--accent);margin-bottom:4px">${fl(longest[0])} · ${wc(longest[1])} words</div>
      <div style="font-size:calc(var(--fs)*.86);color:var(--muted);font-style:italic;line-height:1.65">${esc(longest[1].replace(/^Glory to the Holy Trinity!\n+/,'').trim().substring(0,180))}…</div>
    </div>
    <div style="text-align:center;font-size:calc(var(--fs)*.86);color:var(--muted);font-style:italic;line-height:1.8">"${daysW} days you chose to show up.<br>Glory to the Holy Trinity."</div>`;
}

// ════════════════════════════════════════════
// DELETE
// ════════════════════════════════════════════
function askDel(type,id,label){pendDel={type,id};document.getElementById('cnflbl').textContent=label;document.getElementById('cnfov').classList.add('show');}
function closeCnf(){document.getElementById('cnfov').classList.remove('show');pendDel=null;}
function doDel(){
  if(!pendDel)return;
  const{type,id}=pendDel;
  if(type==='prayer'){prayers=prayers.filter(p=>p.id!==id);P(K.prayer,prayers);renderPrayer();}
  else if(type==='dl'){deadlines=deadlines.filter(d=>d.id!==id);P(K.dl,deadlines);renderDL();updateDLBadge();}
  else if(type==='person'){people=people.filter(p=>p.id!==id);P(K.people,people);renderPeople();updatePPBadge();}
  else if(type==='scripture'){scripture=scripture.filter(s=>s.id!==id);P(K.sc,scripture);renderSC();}
  closeCnf();showToast('Deleted');
}

// ════════════════════════════════════════════
// BACKUP
// ════════════════════════════════════════════
function exportAll(){const payload={notes,grat,mood,special:_special,master:masterText,prayers,habits,hlog,deadlines,people,scripture,psalm:psalmData};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`daily-notes-backup-${TODAY}.json`;a.click();showToast('Backed up ✓');}
function trigImp(){document.getElementById('impFile').value='';document.getElementById('impFile').click();}
function impAll(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imp=JSON.parse(ev.target.result);
      if(imp.notes&&typeof imp.notes==='object'){
        notes={...notes,...imp.notes};
        if(imp.grat)Object.assign(grat,imp.grat);
        if(imp.mood)Object.assign(mood,imp.mood);
        if(imp.special)Object.assign(_special,imp.special);
        if(imp.master)masterText=imp.master;
        if(imp.psalm)psalmData=imp.psalm;
        if(Array.isArray(imp.prayers)){const ids=new Set(prayers.map(p=>p.id));imp.prayers.forEach(p=>{if(!ids.has(p.id))prayers.push(p);});}
        if(Array.isArray(imp.habits))imp.habits.forEach(h=>{if(!habits.find(x=>x.id===h.id))habits.push(h);});
        if(imp.hlog)Object.assign(hlog,imp.hlog);
        if(Array.isArray(imp.deadlines))imp.deadlines.forEach(d=>{if(!deadlines.find(x=>x.id===d.id))deadlines.push(d);});
        if(Array.isArray(imp.people))imp.people.forEach(p=>{if(!people.find(x=>x.id===p.id))people.push(p);});
        if(Array.isArray(imp.scripture))imp.scripture.forEach(s=>{if(!scripture.find(x=>x.id===s.id))scripture.push(s);});
      }else{const keys=Object.keys(imp);if(keys.every(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)))notes={...notes,...imp};else throw 0;}
      saveAll();renderCal();if(curDate)renderDay();renderPsalmDisplay();showToast('Restored ✓');
    }catch{showToast('Could not read that file');}
  };
  reader.readAsText(file);
}

// ════════════════════════════════════════════
let toastT=null;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(searchOpen)closeSearch();
    if(document.getElementById('leftPanel').classList.contains('open'))closeLeft();
    if(document.getElementById('rightPanel').classList.contains('open'))closeRight();
  }
});
